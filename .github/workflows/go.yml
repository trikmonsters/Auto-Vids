name: Audio Narration Scene Analysis

# Workflow ini mengirim file audio ke OpenRouter API menggunakan model
# nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free, lalu menghasilkan
# JSON berisi timestamp + image prompt untuk setiap scene narasi.
# Jumlah scene TIDAK dibatasi - AI yang menentukan sendiri.

on:
  workflow_dispatch:
    inputs:
      audio_path:
        description: "Path file audio di dalam repo (contoh: audio/narration.mp3)"
        required: false
        default: "audio/narration.mp3"
      audio_url:
        description: "Opsional: URL langsung untuk download audio (kalau diisi, akan dipakai dan disimpan ke audio_path)"
        required: false
        default: ""
      enable_reasoning:
        description: "Aktifkan extended reasoning model (true/false)"
        required: false
        default: "true"
      max_tokens:
        description: "Maksimum output token dari model"
        required: false
        default: "8000"
  push:
    paths:
      - "audio/**"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve audio path
        id: vars
        run: |
          AUDIO_PATH="${{ github.event.inputs.audio_path }}"
          if [ -z "$AUDIO_PATH" ]; then
            AUDIO_PATH="audio/narration.mp3"
          fi
          echo "audio_path=$AUDIO_PATH" >> "$GITHUB_OUTPUT"

      - name: Download audio from URL (jika audio_url diisi)
        if: ${{ github.event.inputs.audio_url != '' }}
        run: |
          mkdir -p "$(dirname '${{ steps.vars.outputs.audio_path }}')"
          curl -L "${{ github.event.inputs.audio_url }}" -o "${{ steps.vars.outputs.audio_path }}"

      - name: Run audio scene analysis
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python scripts/analyze_audio.py \
            --input "${{ steps.vars.outputs.audio_path }}" \
            --output "output/scenes.json" \
            --reasoning "${{ github.event.inputs.enable_reasoning || 'true' }}" \
            --max-tokens "${{ github.event.inputs.max_tokens || '8000' }}"

      - name: Upload result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scene-analysis-result
          path: output/scenes.json
          if-no-files-found: error
