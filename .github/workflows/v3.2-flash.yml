              }
              MIN_TRANS_DUR = 0.04   # ~1 frame @25fps, dipakai utk transition_effect "none" (hard cut)
              MAX_TRANS_DUR = 1.5    # batas atas supaya tidak makan durasi klip pendek
              FPS = 25

              def build_vf(movement, duration):
                  """
                  PERBAIKAN UTAMA: zoompan ffmpeg punya bug terkenal kalau sumbernya
                  gambar statis yang di-loop (-loop 1) -- variabel 'in' (input frame)
                  TIDAK bertambah per frame, jadi ekspresi yang memakai 'in' (semua
                  pan_* sebelumnya) menghasilkan posisi statis/diam, bukan bergerak.
                  Solusi resmi yang direkomendasikan komunitas ffmpeg: pakai 'on'
                  (output frame number), yang dijamin selalu bertambah per frame.
                  Kita hitung total_frames secara eksplisit di Python lalu suntikkan
                  sebagai angka literal ke ekspresi, jadi progress = on/total_frames
                  selalu 0 -> 1 sepanjang klip, terlepas dari versi ffmpeg.
                  """
                  total_frames = max(1, int(round(duration * FPS)))

                  if "zoom_in" in movement:
                      z = f"1+0.3*on/{total_frames}"
                      vf = f"scale=2560:1440,zoompan=z='{z}':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                  elif "zoom_out" in movement:
                      z = f"1.3-0.3*on/{total_frames}"
                      vf = f"scale=2560:1440,zoompan=z='{z}':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                  elif "pan_right" in movement:
                      vf = f"scale=2560:1440,zoompan=z=1.2:d=1:x='(on/{total_frames})*(iw-iw/zoom)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                  elif "pan_left" in movement:
                      vf = f"scale=2560:1440,zoompan=z=1.2:d=1:x='(1-(on/{total_frames}))*(iw-iw/zoom)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                  elif "pan_up" in movement:
                      vf = f"scale=2560:1440,zoompan=z=1.2:d=1:x='iw/2-(iw/zoom/2)':y='(1-(on/{total_frames}))*(ih-ih/zoom)':s=1920x1080"
                  elif "pan_down" in movement:
                      vf = f"scale=2560:1440,zoompan=z=1.2:d=1:x='iw/2-(iw/zoom/2)':y='(on/{total_frames})*(ih-ih/zoom)':s=1920x1080"
                  else:
                      vf = "scale=1920:1080"
                  return vf

              clips = []  # list of dict: path, duration, transition_effect, transition_duration
              last_good_image = None
              reused_count = 0

              for i, seg in enumerate(segments):
                  idx_str = str(i+1).zfill(3)
                  img_path = f"release/images/{idx_str}.jpg"
                  duration = float(seg.get("duration", 5.0))

                  if not os.path.exists(img_path):
                      if last_good_image:
                          print(f"⚠️ Gambar {idx_str} tidak ditemukan, pakai gambar segmen sebelumnya (durasi tetap terjaga).")
                          img_path = last_good_image
                          reused_count += 1
                      else:
                          print(f"⚠️ Gambar {idx_str} tidak ditemukan dan belum ada gambar fallback, segmen ini terpaksa dilewati.")
                          continue
                  else:
                      last_good_image = img_path

                  segment_video = f"release/seg_{idx_str}.mp4"
                  movement = seg.get("camera_movement", "static")
                  vf_effects = build_vf(movement, duration)

                  print(f"Memproses segmen 16:9 {idx_str} -> Durasi: {duration} s, Efek Kamera: {movement}")

                  cmd = [
                      "ffmpeg", "-y", "-loop", "1", "-i", img_path,
                      "-vf", vf_effects, "-c:v", "libx264", "-t", str(duration),
                      "-pix_fmt", "yuv420p", "-r", str(FPS), segment_video
                  ]
                  result = subprocess.run(cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
                  if result.returncode != 0:
                      print(f"⚠️ ffmpeg gagal di segmen {idx_str}: {result.stderr.decode(errors='ignore')[:300]}")
                      continue

                  trans_effect = seg.get("transition_effect", "fade")
                  trans_dur = float(seg.get("transition_duration", 0.5) or 0.5)
                  trans_dur = max(MIN_TRANS_DUR, min(trans_dur, MAX_TRANS_DUR, duration / 2))

                  clips.append({
                      "path": segment_video,
                      "duration": duration,
                      "transition_effect": trans_effect,
                      "transition_duration": trans_dur,
                  })

              if reused_count:
                  print(f"\nTotal {reused_count} segmen memakai gambar fallback (gambar asli gagal dibuat).")

              if not clips:
                  raise RuntimeError("Semua segmen gagal diproses, tidak ada video yang bisa disambung.")

              print(f"\nMenyambungkan {len(clips)} klip video 16:9 dengan transisi xfade...")

              if len(clips) == 1:
                  shutil.copy(clips[0]["path"], "release/visual_only.mp4")
              else:
                  inputs_args = []
                  for c in clips:
                      inputs_args += ["-i", c["path"]]

                  filter_parts = []
                  cum_dur = clips[0]["duration"]
                  prev_label = "0:v"
                  for i in range(1, len(clips)):
                      trans_effect = clips[i - 1]["transition_effect"]
                      d = clips[i - 1]["transition_duration"]
                      ttype = TRANSITION_MAP.get(trans_effect, "fade")

                      offset = max(0.0, cum_dur - d)
                      out_label = f"v{i}"
                      filter_parts.append(
                          f"[{prev_label}][{i}:v]xfade=transition={ttype}:duration={d:.3f}:offset={offset:.3f}[{out_label}]"
                      )
                      cum_dur = cum_dur + clips[i]["duration"] - d
                      prev_label = out_label

                  filter_complex = ";".join(filter_parts)
                  xfade_cmd = ["ffmpeg", "-y"] + inputs_args + [
                      "-filter_complex", filter_complex,
                      "-map", f"[{prev_label}]",
                      "-c:v", "libx264", "-pix_fmt", "yuv420p", "-r", str(FPS),
                      "release/visual_only.mp4"
                  ]
                  result = subprocess.run(xfade_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
                  if result.returncode != 0 or not os.path.exists("release/visual_only.mp4"):
                      raise RuntimeError(f"Gagal membuat transisi xfade: {result.stderr.decode(errors='ignore')[:500]}")

              with wave.open("output/audio.wav", "rb") as wf:
                  audio_duration = wf.getnframes() / float(wf.getframerate())

              probe = subprocess.run(
                  ["ffprobe", "-v", "error", "-show_entries", "format=duration",
                   "-of", "default=noprint_wrappers=1:nokey=1", "release/visual_only.mp4"],
                  capture_output=True, text=True
              )
              video_duration = float(probe.stdout.strip() or 0)
              diff = audio_duration - video_duration
              print(f"\nDurasi audio asli   : {audio_duration:.2f}s")
              print(f"Durasi visual track  : {video_duration:.2f}s (selisih: {diff:+.2f}s)")

              visual_path = "release/visual_only.mp4"
              if diff > 0.15:
                  print(f"Visual lebih pendek dari audio, extend {diff:.2f}s dengan freeze-frame terakhir...")
                  pad_cmd = [
                      "ffmpeg", "-y", "-i", "release/visual_only.mp4",
                      "-vf", f"tpad=stop_mode=clone:stop_duration={diff:.3f}",
                      "-c:v", "libx264", "-pix_fmt", "yuv420p", "-r", str(FPS),
                      "release/visual_padded.mp4"
                  ]
                  result = subprocess.run(pad_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
                  if result.returncode == 0 and os.path.exists("release/visual_padded.mp4"):
                      visual_path = "release/visual_padded.mp4"
                  else:
                      print(f"⚠️ Gagal extend video, lanjut tanpa padding: {result.stderr.decode(errors='ignore')[:300]}")

              print("Menggabungkan visual dengan audio narasi asli (durasi dikunci ke durasi audio)...")
              final_cmd = [
                  "ffmpeg", "-y", "-i", visual_path, "-i", "output/audio.wav",
                  "-c:v", "copy" if visual_path == "release/visual_only.mp4" and diff <= 0.15 else "libx264",
                  "-pix_fmt", "yuv420p",
                  "-c:a", "aac", "-t", f"{audio_duration:.3f}",
                  "output/final_project_video.mp4"
              ]
              result = subprocess.run(final_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
              if result.returncode != 0 or not os.path.exists("output/final_project_video.mp4"):
                  raise RuntimeError(f"Gagal menggabungkan video & audio: {result.stderr.decode(errors='ignore')[:300]}")

              print("\n" + "="*70)
              print("✓ BERHASIL: Video final panjang 16:9 disimpan di 'output/final_project_video.mp4'")
              print("="*70)

          except Exception as e:
              print("\n" + "="*70)
              print(f"⚠️ GAGAL membuat video final: {e}")
              print("Pipeline TETAP dilanjutkan tanpa final_project_video.mp4.")
              print("Asset yang tetap akan dipublish ke release: output/audio.wav, release/analysis.json, release/images.zip")
              print("="*70)

          sys.exit(0)
          PYEOF

      - name: Create Artifacts Images
        if: always()
        run: |
          mkdir -p release/images
          cd release
          zip -r images.zip images/ || echo "Tidak ada gambar untuk di-zip, lanjut tanpa images.zip"
          cd ..

      - name: Upload Video to YouTube
        if: always()
        continue-on-error: true
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ github.event.inputs.youtube_privacy }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          try:
              VIDEO_PATH = "output/final_project_video.mp4"
              THUMBNAIL_PATH = "release/thumbnail.jpg"
              ANALYSIS_PATH = "release/analysis.json"

              if not os.path.exists(VIDEO_PATH):
                  print("⚠️ output/final_project_video.mp4 tidak ada, skip upload ke YouTube.")
                  sys.exit(0)

              required_secrets = ["YOUTUBE_CLIENT_ID", "YOUTUBE_CLIENT_SECRET", "YOUTUBE_REFRESH_TOKEN"]
              missing = [s for s in required_secrets if not os.environ.get(s)]
              if missing:
                  print(f"⚠️ Secret belum diset: {', '.join(missing)}. Skip upload ke YouTube.")
                  print("Lihat panduan setup OAuth YouTube di pesan chat untuk cara mendapatkannya.")
                  sys.exit(0)

              from google.oauth2.credentials import Credentials
              from googleapiclient.discovery import build
              from googleapiclient.http import MediaFileUpload

              with open(ANALYSIS_PATH, "r", encoding="utf8") as f:
                  analysis = json.load(f)

              title = (analysis.get("youtube_title") or "Psychological Narrative").strip()[:100]
              description = analysis.get("youtube_description") or ""
              tags = analysis.get("youtube_tags") or []
              privacy_status = os.environ.get("YOUTUBE_PRIVACY") or "private"

              print("\n" + "="*70)
              print(" UPLOAD VIDEO KE YOUTUBE ")
              print("="*70)
              print(f"Judul     : {title}")
              print(f"Privacy   : {privacy_status}")
              print(f"Tags      : {len(tags)} tags\n")

              creds = Credentials(
                  token=None,
                  refresh_token=os.environ["YOUTUBE_REFRESH_TOKEN"],
                  client_id=os.environ["YOUTUBE_CLIENT_ID"],
                  client_secret=os.environ["YOUTUBE_CLIENT_SECRET"],
                  token_uri="https://oauth2.googleapis.com/token",
                  scopes=["https://www.googleapis.com/auth/youtube.upload"],
              )

              youtube = build("youtube", "v3", credentials=creds)

              body = {
                  "snippet": {
                      "title": title,
                      "description": description,
                      "tags": tags,
                      "categoryId": "27",  # Education -- ganti sesuai kebutuhan
                  },
                  "status": {
                      "privacyStatus": privacy_status,
                      "selfDeclaredMadeForKids": False,
                  },
              }

              media = MediaFileUpload(VIDEO_PATH, chunksize=-1, resumable=True, mimetype="video/mp4")
              request = youtube.videos().insert(part="snippet,status", body=body, media_body=media)

              response = None
              while response is None:
                  status, response = request.next_chunk()
                  if status:
                      print(f"  Upload progress: {int(status.progress() * 100)}%")

              video_id = response["id"]
              print(f"\n✓ Video berhasil diupload. Video ID: {video_id}")
              print(f"  URL: https://youtu.be/{video_id}")

              if os.path.exists(THUMBNAIL_PATH):
                  print("\nMengatur thumbnail...")
                  try:
                      youtube.thumbnails().set(
                          videoId=video_id,
                          media_body=MediaFileUpload(THUMBNAIL_PATH, mimetype="image/jpeg")
                      ).execute()
                      print("✓ Thumbnail berhasil diset.")
                  except Exception as e:
                      print(f"⚠️ Video tetap terupload, tapi gagal set thumbnail: {e}")
              else:
                  print("⚠️ release/thumbnail.jpg tidak ditemukan, skip set thumbnail.")

              with open("release/youtube_video_id.txt", "w", encoding="utf8") as f:
                  f.write(f"https://youtu.be/{video_id}\n")

              print("\n" + "="*70)
              print("✓ UPLOAD YOUTUBE SELESAI")
              print("="*70)

          except Exception as e:
              print("\n" + "="*70)
              print(f"⚠️ GAGAL upload ke YouTube: {e}")
              print("Pipeline tetap dilanjutkan, asset lain tetap dipublish ke release.")
              print("="*70)

          sys.exit(0)
          PYEOF

      - name: Publish Release Assets
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_number }}
          name: Storyboard & Video Widescreen Project ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          preserve_order: true
          files: |
            output/audio.wav
            output/final_project_video.mp4
            release/analysis.json
            release/images.zip
            release/thumbnail.jpg
            release/youtube_video_id.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
