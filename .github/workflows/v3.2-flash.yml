name: Vids V3.2 Flash

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Masukkan Judul atau Topik Narasi (Psychology)"
        required: true
        type: string
      language:
        description: "Bahasa narasi, audio, metadata & thumbnail"
        required: false
        type: choice
        options:
          - Indonesian
          - English
        default: "English"
      voice:
        description: "Gemini Voice (pilih sesuai bahasa)"
        required: false
        type: choice
        options:
          - Sulafat
          - Leda
          - Aoede
          - Kore
          - Charon
          - Fenrir
          - Puck
          - Schedar
        default: "Aoede"
      paragraph_gap:
        description: "Gap antar paragraf (detik)"
        required: false
        default: "1"
      youtube_privacy:
        description: "Status privasi video YouTube"
        required: false
        type: choice
        options:
          - private
          - unlisted
          - public
        default: "public"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TOPIC_INPUT: ${{ github.event.inputs.topic }}
      VOICE_NAME: ${{ github.event.inputs.voice }}
      LANGUAGE: ${{ github.event.inputs.language }}
      PARA_GAP: ${{ github.event.inputs.paragraph_gap }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth google-auth-oauthlib

      - name: Setup Node.js and Install Dependencies
        run: |
          npm init -y
          npm install playwright playwright-extra puppeteer-extra-plugin-stealth sharp
          npx playwright install chromium

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Prepare Workspace
        run: |
          mkdir -p output release

      - name: Generate script with Elite Narrative Design
        env:
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          cat > generate-script.js << 'JSEOF'
          const { chromium } = require('playwright-extra');
          const stealth = require('puppeteer-extra-plugin-stealth')();
          chromium.use(stealth);
          const fs = require('fs');

          const TOPIC = process.env.TOPIC_INPUT || '';
          const LANGUAGE = process.env.LANGUAGE || 'Indonesian';
          const MIN_WORDS = 1400;
          const MAX_ATTEMPTS = 3;

          const FULL_PROMPT = `You are a master of psychological subversion and narrative design. Your work functions like a cognitive trap: once the reader starts, they cannot look away.

          STRICT RULES:
          1. Every paragraph begins with a cold, piercing psychological insight — NOT a generic question.
          2. Every paragraph is 4-6 long, fully developed sentences minimum. Dense blocks of text. No bullet points. No short lines.
          3. Treat human emotions as physical phenomena. Use architectural, biological, and quantum metaphors.
          4. PROHIBITED: "In summary", "In conclusion", "It is important to remember", "Human behavior is complex". No named characters. No generic advice.
          5. The narrative must escalate from a relatable psychological premise into a surreal, existential realization.
          6. Write the ENTIRE narrative in fluent, native-level ${LANGUAGE}. Every word must read as if written by a literary native speaker.
          
          Now write a 1700+ word, highly immersive psychological narrative on this topic: "${TOPIC}"
          
          - Every paragraph MUST begin with an aggressive, hook-driven insight.
          - Cold, cinematic, sophisticated tone throughout.
          - Narrative deepens into existential dread or profound discovery.
          - Dense academic-poetic language.
          - Output ONLY the narrative text. No title, no preamble — start directly with the first word of the story.`;

          const sleep = ms => new Promise(r => setTimeout(r, ms));

          async function tryGenerate(attempt) {
            console.log(`\n[Attempt ${attempt}/${MAX_ATTEMPTS}] Launching browser...`);
            const browser = await chromium.launch({
              headless: true,
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-blink-features=AutomationControlled']
            });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 1000 },
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36',
              locale: 'id-ID'
            });
            const page = await context.newPage();

            try {
              console.log('Navigating to Google AI Mode...');
              await page.goto('https://www.google.com/aimode', { waitUntil: 'networkidle', timeout: 60000 });

              const chatInput = page.locator('textarea.ITIRGe, textarea[placeholder*="Tanyakan"], textarea[placeholder*="Ask"], textarea[aria-label*="Search"]').first();
              await chatInput.waitFor({ state: 'visible', timeout: 30000 });
              console.log('Input ready. Filling prompt...');

              await chatInput.fill(FULL_PROMPT);
              await chatInput.press('Enter');
              console.log('Prompt sent. Waiting for response...');

              await sleep(5000);

              console.log('Polling for full response (max 5 minutes)...');
              const startTime = Date.now();
              const TIMEOUT = 300000;
              let lastLength = 0;
              let stableCount = 0;

              while (Date.now() - startTime < TIMEOUT) {
                const bodyText = await page.evaluate(() => document.body.innerText);
                const currentLength = bodyText.length;

                if (currentLength === lastLength) {
                  stableCount++;
                  if (stableCount >= 6) {
                    console.log('Response appears stable (no new text for 12s).');
                    break;
                  }
                } else {
                  stableCount = 0;
                  lastLength = currentLength;
                }

                await sleep(2000);
              }

              const responseBlocks = await page.locator('[data-attrid], .LLtSOc, .mod, .kno-rdesc, .BNeawe').all();
              let responseText = '';

              const candidates = [
                '[data-message-author-role="model"] .markdown',
                '.AI-response-container',
                '.response-container',
                'div[jsname] p',
              ];

              for (const sel of candidates) {
                const els = await page.locator(sel).all();
                if (els.length > 0) {
                  const texts = await Promise.all(els.map(e => e.innerText()));
                  const joined = texts.join('\n\n').trim();
                  if (joined.length > responseText.length) responseText = joined;
                }
              }

              if (!responseText || responseText.split(/\s+/).length < MIN_WORDS) {
                const bodyText = await page.evaluate(() => document.body.innerText);
                const promptIndex = bodyText.indexOf(TOPIC.slice(0, 40));
                if (promptIndex !== -1) {
                  responseText = bodyText.slice(promptIndex + TOPIC.length).trim();
                }
              }

              const wordCount = responseText.trim().split(/\s+/).length;
              console.log(`Response captured: ${wordCount} words`);

              if (wordCount < MIN_WORDS) {
                await page.screenshot({ path: 'debug-aimode.png', fullPage: true });
                throw new Error(`Response too short: ${wordCount} words (minimum ${MIN_WORDS}). Screenshot saved.`);
              }

              return responseText.trim();

            } finally {
              await browser.close();
            }
          }

          (async () => {
            console.log('='.repeat(60));
            console.log(' GENERATE NARRATIVE VIA GOOGLE AI MODE ');
            console.log('='.repeat(60));
            console.log(`Topic    : ${TOPIC}`);
            console.log(`Language : ${LANGUAGE}`);

            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              try {
                const narrative = await tryGenerate(attempt);
                fs.writeFileSync('tts-script.txt', narrative, 'utf8');
                const wc = narrative.split(/\s+/).length;
                console.log('\n' + '='.repeat(60));
                console.log(`✓ Narrative saved to tts-script.txt: ${wc} words`);
                console.log('='.repeat(60));
                console.log('\n--- PREVIEW (first 300 chars) ---');
                console.log(narrative.slice(0, 300) + '...');
                process.exit(0);
              } catch (err) {
                console.error(`Attempt ${attempt} failed: ${err.message}`);
                if (attempt < MAX_ATTEMPTS) {
                  const wait = 20 * attempt;
                  console.log(`Waiting ${wait}s before retry...`);
                  await sleep(wait * 1000);
                }
              }
            }

            console.error(`::error::Gagal generate narasi setelah ${MAX_ATTEMPTS} percobaan.`);
            process.exit(1);
          })();
          JSEOF

          node generate-script.js

          echo "========================================="
          echo "Generated Words : $(wc -w < tts-script.txt)"
          echo "========================================="
          echo "========================================="

      - name: Generate TTS Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          import wave
          import struct
          import time
          import textwrap
          import subprocess
          from google import genai
          from google.genai import types

          API_KEY = os.environ["GEMINI_API_KEY"]
          VOICE = os.environ["VOICE_NAME"]
          LANGUAGE_LABEL = os.environ["LANGUAGE"]
          GAP = float(os.environ["PARA_GAP"])
          SAMPLE_RATE = 24000
          CHANNELS = 1
          SAMPLE_WIDTH = 2

          LANGUAGE_MAP = {
              "Indonesian": "id-ID",
              "English": "en-US",
          }
          TTS_LANG = LANGUAGE_MAP.get(LANGUAGE_LABEL, "id-ID")

          TARGET_WORDS_PER_CHUNK = 320
          MAX_REQUESTS = 8
          MODEL_NAME = "gemini-3.1-flash-tts-preview"

          print("\n" + "="*70)
          print(" GEMINI TTS - SMART CHUNKING + RATE LIMIT SAFE MODE ")
          print("="*70)

          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw = f.read().strip()

          single_paragraphs = [p.strip() for p in raw.split("\n\n") if p.strip()]

          if not single_paragraphs:
              print("Error: No paragraphs found!")
              exit(1)

          paragraphs = []
          current_chunk = []
          current_words = 0

          for p in single_paragraphs:
              wc = len(p.split())
              if current_words + wc > TARGET_WORDS_PER_CHUNK and current_chunk:
                  paragraphs.append("\n\n".join(current_chunk))
                  current_chunk = []
                  current_words = 0
              current_chunk.append(p)
              current_words += wc

          if current_chunk:
              paragraphs.append("\n\n".join(current_chunk))

          while len(paragraphs) > MAX_REQUESTS:
              merged = []
              i = 0
              while i < len(paragraphs):
                  if i + 1 < len(paragraphs):
                      merged.append(paragraphs[i] + "\n\n" + paragraphs[i + 1])
                      i += 2
                  else:
                      merged.append(paragraphs[i])
                      i += 1
              paragraphs = merged

          print(f"Voice            : {VOICE}")
          print(f"Language         : {LANGUAGE_LABEL} ({TTS_LANG})")
          print(f"Total Batches    : {len(paragraphs)} (limit aman: {MAX_REQUESTS})")
          print("Rate Limit Safe  : Active (Max 3 requests per minute)\n")

          client = genai.Client(api_key=API_KEY)

          def silence(sec):
              n = int(SAMPLE_RATE * sec)
              return struct.pack(f"<{n}h", *([0] * n))

          def build_prompt(text, index, total):
              style = (
                  "Speak with a calm, warm, measured pace. Keep the volume steady and moderate throughout — not loud, not whispering. Use soft emphasis on key phrases rather than dramatic volume swings."
                  if index == 0 else
                  "Speak with a gentle, composed, slightly reflective tone. Keep the volume steady and moderate. Fade softly toward silence at the very end of this passage."
                  if index == total - 1 else
                  "Speak clearly and steadily, like a confident documentary narrator. Maintain a consistent moderate volume throughout this entire passage — no sudden loud bursts, no dips to a whisper. Vary only your pace and intonation for emphasis, not your volume level."
              )
              return f"Language: {TTS_LANG}\n\n{style}\n\n{textwrap.dedent(text)}"

          def call_tts(prompt_text):
              return client.models.generate_content(
                  model=MODEL_NAME,
                  contents=prompt_text,
                  config=types.GenerateContentConfig(
                      response_modalities=["AUDIO"],
                      speech_config=types.SpeechConfig(
                          voice_config=types.VoiceConfig(
                              prebuilt_voice_config=types.PrebuiltVoiceConfig(
                                  voice_name=VOICE
                              )
                          )
                      )
                  )
              )

          pcm = []

          for i, p in enumerate(paragraphs):
              print("-"*70)
              print(f"Processing Batch {i+1}/{len(paragraphs)}")
              print(textwrap.shorten(p.replace('\n', ' '), 80))

              prompt_text = build_prompt(p, i, len(paragraphs))
              success = False

              for retry in range(5):
                  try:
                      response = call_tts(prompt_text)

                      if response.candidates and response.candidates[0].content.parts:
                          audio = response.candidates[0].content.parts[0].inline_data.data
                          pcm.append(audio)
                          print("✓ Audio generated")
                          success = True
                          break
                      else:
                          print("No audio data received, retrying...")
                          time.sleep(15)

                  except Exception as e:
                      msg = str(e)

                      if "429" in msg or "RESOURCE_EXHAUSTED" in msg or "quota" in msg.lower():
                          wait = 90 * (retry + 1)
                          print(f"[429] Kena limit kuota RPM/RPD (attempt {retry+1}/5): {e}")
                          print(f"Menunggu {wait}s sebelum retry (kuota perlu waktu untuk reset)...")
                          time.sleep(wait)

                      elif "503" in msg or "UNAVAILABLE" in msg or "500" in msg:
                          wait = 20 * (retry + 1)
                          print(f"[503/500] Server overload / model sibuk (attempt {retry+1}/5): {e}")
                          print(f"Menunggu {wait}s sebelum retry...")
                          time.sleep(wait)

                      else:
                          wait = 20 * (retry + 1)
                          print(f"Error tak terduga (attempt {retry+1}/5): {e}")
                          time.sleep(wait)

              if not success:
                  print(f"Failed at batch {i+1} setelah semua retry gagal.")
                  exit(1)

              if i != len(paragraphs) - 1:
                  pcm.append(silence(GAP))
                  print("⏳ Cooling down 21 seconds to respect Gemini Free Tier RPM Limit...")
                  time.sleep(21)

          out = "output/audio.wav"
          with wave.open(out, "wb") as wf:
              wf.setnchannels(CHANNELS)
              wf.setsampwidth(SAMPLE_WIDTH)
              wf.setframerate(SAMPLE_RATE)
              wf.writeframes(b"".join(pcm))

          duration = sum(len(x) for x in pcm) / (SAMPLE_RATE * SAMPLE_WIDTH)

          print("\nMenormalkan loudness audio (EBU R128) supaya volume antar batch konsisten...")
          norm_out = "output/audio_normalized.wav"
          norm_cmd = [
              "ffmpeg", "-y", "-i", out,
              "-af", "acompressor=threshold=0.089:ratio=4:attack=5:release=50:makeup=1,loudnorm=I=-18:TP=-2:LRA=7",
              "-ar", str(SAMPLE_RATE), "-ac", str(CHANNELS),
              norm_out
          ]
          result = subprocess.run(norm_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
          if result.returncode == 0 and os.path.exists(norm_out):
              os.replace(norm_out, out)
              print("✓ Loudness berhasil dinormalkan (target -18 LUFS, konsisten & tidak terlalu keras).")
          else:
              print(f"⚠️ Gagal normalisasi loudness, memakai audio asli tanpa normalisasi: {result.stderr.decode(errors='ignore')[:300]}")

          print("\n" + "="*70)
          print("SUCCESSFULLY COMPLETED")
          print("="*70)
          print(f"Output   : {out}")
          print(f"Duration : {duration:.1f} seconds\n")
          PYEOF

      - name: Analyze Audio (Chunked Process)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import time
          import math
          import wave
          import textwrap
          from google import genai
          from google.genai import types

          LANGUAGE = os.environ.get("LANGUAGE", "Indonesian")

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          MODEL_LIST = [
              "gemini-3.5-flash",
              "gemini-3.1-pro-preview",
              "gemini-3.1-flash-lite",
              "gemini-3-flash-preview",
              "gemma-4-26b-a4b-it",
              "gemma-4-31b-it",
          ]
          MAX_ROUNDS = 3

          def analyze_chunk(audio_file, prompt, sys_instruction, label, expected_duration=None, min_segments_needed=None):
              last_error = None
              for round_num in range(1, MAX_ROUNDS + 1):
                  for model_name in MODEL_LIST:
                      print(f"[{label}] Round {round_num}/{MAX_ROUNDS} -> mencoba model: {model_name}")
                      try:
                          response = client.models.generate_content(
                              model=model_name,
                              contents=[audio_file, prompt],
                              config=types.GenerateContentConfig(
                                  system_instruction=sys_instruction,
                                  response_mime_type="application/json"
                              )
                          )
                          data = json.loads(response.text)
                          segments = data.get("segments", [])
                          total_seg_dur = sum(float(s.get("duration", 0) or 0) for s in segments)

                          if expected_duration and min_segments_needed:
                              if len(segments) < min_segments_needed or total_seg_dur < expected_duration * 0.6:
                                  raise ValueError(
                                      f"Hasil under-segmented: {len(segments)} segmen (butuh >= {min_segments_needed}), "
                                      f"total durasi segmen {total_seg_dur:.1f}s vs ekspektasi ~{expected_duration:.1f}s"
                                  )

                          print(f"  ✓ [{label}] Berhasil dengan model {model_name} ({len(segments)} segments, total {total_seg_dur:.1f}s)")
                          return data
                      except Exception as e:
                          last_error = e
                          msg = str(e)
                          if "503" in msg or "UNAVAILABLE" in msg or "500" in msg:
                              print(f"  ⚠️ {model_name} overload (503/500), lanjut ke model berikutnya...")
                          elif "429" in msg or "RESOURCE_EXHAUSTED" in msg or "quota" in msg.lower():
                              print(f"  ⚠️ {model_name} kena limit kuota (429), lanjut ke model berikutnya...")
                          elif "under-segmented" in msg:
                              print(f"  ⚠️ {model_name}: {msg}, lanjut ke model berikutnya...")
                          else:
                              print(f"  ⚠️ {model_name} error: {str(e)[:200]}")

                  if round_num < MAX_ROUNDS:
                      wait = 30 * round_num
                      print(f"[{label}] Semua {len(MODEL_LIST)} model gagal di round {round_num}. Menunggu {wait}s lalu mengulang dari model pertama...")
                      time.sleep(wait)

              print(f"[{label}] ⚠️ GAGAL TOTAL setelah {MAX_ROUNDS} putaran x {len(MODEL_LIST)} model. Error terakhir: {last_error}")
              return {"summary": f"Analisis {label} gagal total setelah semua model & retry dicoba.", "segments": []}

          def generate_metadata_with_fallback(prompt, sys_instruction):
              """
              Sama mekanisme fallback/retry seperti analyze_chunk, tapi text-only
              (tidak perlu file audio) -- dipakai khusus untuk generate metadata
              YouTube (judul/deskripsi/tags) + thumbnail_prompt berdasarkan naskah
              & summary lengkap, bukan per-segmen.
              """
              last_error = None
              for round_num in range(1, MAX_ROUNDS + 1):
                  for model_name in MODEL_LIST:
                      print(f"[YouTube Metadata] Round {round_num}/{MAX_ROUNDS} -> mencoba model: {model_name}")
                      try:
                          response = client.models.generate_content(
                              model=model_name,
                              contents=prompt,
                              config=types.GenerateContentConfig(
                                  system_instruction=sys_instruction,
                                  response_mime_type="application/json"
                              )
                          )
                          data = json.loads(response.text)
                          title = (data.get("youtube_title") or "").strip()
                          desc = (data.get("youtube_description") or "").strip()
                          tags = data.get("youtube_tags") or []
                          thumb = (data.get("thumbnail_prompt") or "").strip()

                          if len(title) < 10:
                              raise ValueError("youtube_title terlalu pendek/kosong")
                          if len(desc) < 80:
                              raise ValueError("youtube_description terlalu pendek/kosong")
                          if len(tags) < 5:
                              raise ValueError("youtube_tags terlalu sedikit (<5)")
                          if len(thumb) < 300:
                              raise ValueError("thumbnail_prompt terlalu pendek/kosong")

                          print(f"  ✓ [YouTube Metadata] Berhasil dengan model {model_name}")
                          return data
                      except Exception as e:
                          last_error = e
                          msg = str(e)
                          if "503" in msg or "UNAVAILABLE" in msg or "500" in msg:
                              print(f"  ⚠️ {model_name} overload (503/500), lanjut ke model berikutnya...")
                          elif "429" in msg or "RESOURCE_EXHAUSTED" in msg or "quota" in msg.lower():
                              print(f"  ⚠️ {model_name} kena limit kuota (429), lanjut ke model berikutnya...")
                          else:
                              print(f"  ⚠️ {model_name} error/hasil tidak valid: {str(e)[:200]}")

                  if round_num < MAX_ROUNDS:
                      wait = 30 * round_num
                      print(f"[YouTube Metadata] Semua model gagal di round {round_num}. Menunggu {wait}s lalu mengulang...")
                      time.sleep(wait)

              print(f"[YouTube Metadata] ⚠️ GAGAL TOTAL setelah {MAX_ROUNDS} putaran. Error terakhir: {last_error}")
              return None

          print("\n" + "="*70)
          print(" AUDIO ANALYSIS (CHUNKED OMIT LIMIT MODE) ")
          print("="*70 + "\n")

          print("Uploading full audio...")
          audio = client.files.upload(file="output/audio.wav")
          print("✓ Upload completed")
          print(f"{audio.uri}\n")

          system_instruction = f"""
          You are an Elite Avant-Garde Creative Director and Master Cyber-Surrealist Artist specializing in world-class 2D modern flat vector illustration for deep psychological, philosophical, and high-intellect cinematic narratives.

          Your job is to translate complex emotional audio into a richly detailed, FINELY-GRAINED visual timeline (many short segments, never a few long ones) plus precise FFmpeg camera/transition directives.

          SEGMENTATION PRIORITY (READ THIS FIRST, IT IS NON-NEGOTIABLE):
          - Granularity is the top priority. Many short segments (3-8 seconds each) are strongly preferred over a few long ones. Hundreds of segments across the full narration is perfectly normal and encouraged — never compress multiple distinct sentences, images, or emotional beats into one oversized segment just to produce a shorter response.
          - Every meaningful shift in tone, imagery, sentence, or emotional beat in the narration deserves its own dedicated segment.
          - The sum of every segment's "duration" must add up to the EXACT total duration of the audio section given to you below. Never leave gaps, never exceed 8 seconds per segment.

          CRITICAL QUALITY MANDATE FOR IMAGE_PROMPT:
          - Every single 'image_prompt' MUST be an incredibly dense, ultra-detailed masterpiece, strictly between 1,800 and 2,500 characters long. Avoid generic, filler, or repeated phrasing — each one must vividly describe a genuinely distinct moment tied directly to that segment's spoken text.
          - DO NOT mention resolution, quality, or aspect-ratio buzzwords such as '8K', '4K', 'UHD', 'ultra high resolution', '16:9', or 'widescreen'. Aspect ratio and resolution are already configured separately in the rendering pipeline — wasting characters on this adds zero value. Spend every available character on substantive visual description instead.
          - RELEVANCE: The image_prompt must directly visualize what is being said in THAT exact segment's "text" field, not something generic or only loosely related. Re-read the segment's spoken text before writing its image_prompt.
          - ON-IMAGE TEXT: If you include any on-image text (such as the dynamic header), it must be written in {LANGUAGE}, matching the narration's language — never default to English unless {LANGUAGE} is English.
          - STYLE: Masterpiece 2D Modern Flat Vector Illustration, highly sophisticated editorial design style, clean geometric shapes, complex vector layering. NEVER use 'photorealistic', '3D render', 'hyperrealistic', 'skeuomorphic', or 'octane render'.
          - VISUAL DEPTH: The flat vector style must look premium, complex, and cinematic. Achieve this through multi-layered backgrounds, isometric perspectives, intricate geometric patterns, and rich textures created purely from flat vector shading.
          - CHARACTER DESIGN: The subject must be an expressive character with elegant, avant-garde cartoonish proportions (slightly enlarged head to amplify deep internal emotion, expressive eyes, stylized anatomy). Clothing must feature solid, rich, deeply saturated colors with crisp minimalist creases.
          - BACKGROUND & ENVIRONMENT: A striking, minimalist but highly detailed environment drawn with ultra-thin, precise light-gray and muted-ink lines. The setting must feel vast, atmospheric, and architectural, incorporating clean lines, perfect symmetry, or unsettling distorted perspectives on a pure clinical white canvas.
          - LIGHTING & COLOR PALETTE: Establish high-contrast, moody, and dramatic atmospheric lighting using flat color gradients and sharp vector shadows (chiaroscuro vector technique). Use an elite, highly curated color palette: deep midnight blues, rich terracottas, muted sages, or royal gold accents clashing against the clean white environment.
          - SURREAL PSYCHOLOGICAL METAPHOR: This is the core focus. You must avoid literal interpretations. Incorporate profound, mind-bending, and highly unexpected surreal psychological metaphors to depict the subconscious mind, and make sure the metaphor is SPECIFIC to what is being said in this exact segment (not a generic, reused metaphor). (Examples: a character's head shattering into a perfectly organized constellation of geometric glass shards, shadows stretching into infinite labyrinthine corridors, or thoughts manifesting as neon threads weaving through an architectural void).

          FFmpeg VIDEO EDITING MANDATE:
          Determine the best movement and transition for each segment based on emotional intensity:
          - camera_movement options: 'zoom_in_slow', 'zoom_out_slow', 'pan_left', 'pan_right', 'pan_up', 'pan_down', 'static'.
          - transition_effect options: 'fade', 'crossfade', 'wipe_left', 'wipe_right', 'slide_up', 'zoom_blur', 'none'.

          Strictly output ONLY valid JSON matching the exact schema provided. No markdown wrappers.
          """

          base_prompt_template = """
          Analyze the specified part of this narration audio. Break the timeline into MANY short, sequential segments with precise timestamps.

          CRITICAL FOCUS: You must ONLY analyze the part of the audio that matches this text section:
          \"\"\"{text_chunk}\"\"\"

          CRITICAL SEGMENT REQUIREMENT (DO NOT IGNORE):
          - This audio section spans approximately {expected_duration:.0f} seconds.
          - Aim for around {target_segments} segments (roughly 3-8 seconds each). Producing MORE than this target is GOOD and welcomed — never fewer.
          - The absolute minimum allowed is {min_segments} segments. Fewer than this will cause your entire response to be rejected and retried with a different model.
          - Every segment's "duration" must be between 3 and 8 seconds, no exceptions.
          - The sum of all "duration" values must add up to approximately {expected_duration:.0f} seconds, covering the section from start to end with NO gaps and NO overlap.

          Your output must strictly follow this JSON structure:
          {{
            "summary": "Deep overarching theme analysis for this section.",
            "segments": [
              {{
                "start": "MM:SS",
                "end": "MM:SS",
                "duration": 5,
                "text": "Spoken text matching the audio timestamp.",
                "subtitle": "Clean subtitle.",
                "image_prompt": "Top text header dynamically reads: '[DYNAMIC HEADERTEXT]'. [Write an extremely exhaustive, detailed 1,800-2,500 character description of the subject, their profound psychological expression, avant-garde cartoonish proportions, specific rich clothing colors, and precise body language, directly tied to what is spoken in THIS exact segment]. [Describe an incredibly vivid, complex, and mind-blowing surreal psychological metaphor action occurring in the scene that represents the subconscious mind in depth, specific to this exact moment — not a generic reused metaphor]. Background: a vast, meticulous, and stunning minimalist environment composed of ultra-thin light-gray architectural line art outlines, intricate geometric patterns, and layered isometric structures on a pure crisp white background. Aesthetic: high-contrast dramatic vector shadows, crisp geometric execution, highly curated color palette featuring deep muted tones, professional corporate-surrealist editorial art style. Do not mention resolution, quality, or aspect ratio anywhere in this description.",
                "camera_movement": "Choose one: zoom_in_slow / zoom_out_slow / pan_left / pan_right / pan_up / pan_down / static",
                "transition_effect": "Choose one: fade / crossfade / wipe_left / wipe_right / slide_up / zoom_blur / none",
                "transition_duration": 0.5,
                "emotion": "Subconscious emotion."
              }}
            ]
          }}
          Note: image_prompt must be 1,800-2,500 characters, densely packed and meticulously detailed, with zero mention of resolution/aspect-ratio/quality buzzwords (that is handled separately by the rendering pipeline).
          """

          TARGET_SEG_SECONDS = 5.0      # target rata-rata panjang tiap segmen (tengah rentang 3-8s)
          MAX_SEGMENTS_PER_CALL = 15    # batas segmen per panggilan API agar output JSON tidak ter-truncate

          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw_script = f.read().strip()

          single_paragraphs = [p.strip() for p in raw_script.split("\n\n") if p.strip()]
          total_words = len(raw_script.split()) or 1

          with wave.open("output/audio.wav", "rb") as wf:
              total_audio_duration = wf.getnframes() / float(wf.getframerate())

          expected_total_segments = max(1, math.ceil(total_audio_duration / TARGET_SEG_SECONDS))
          num_chunks = max(1, math.ceil(expected_total_segments / MAX_SEGMENTS_PER_CALL))

          print(f"Total durasi audio asli  : {total_audio_duration:.1f}s")
          print(f"Estimasi total segmen    : ~{expected_total_segments} (target {TARGET_SEG_SECONDS:.0f}s/segmen, boleh lebih banyak)")
          print(f"Jumlah chunk analisis    : {num_chunks} (maks {MAX_SEGMENTS_PER_CALL} segmen/chunk supaya JSON tidak ter-truncate)\n")

          words_per_chunk_target = total_words / num_chunks
          chunks_text = []
          current = []
          current_words = 0
          for p in single_paragraphs:
              wc = len(p.split())
              if current_words >= words_per_chunk_target and current and len(chunks_text) < num_chunks - 1:
                  chunks_text.append("\n\n".join(current))
                  current = []
                  current_words = 0
              current.append(p)
              current_words += wc
          if current:
              chunks_text.append("\n\n".join(current))

          combined_segments = []
          summary_parts = []

          for idx, chunk_text in enumerate(chunks_text, start=1):
              label = f"Part {idx}/{len(chunks_text)}"
              chunk_words = len(chunk_text.split())
              chunk_expected_dur = total_audio_duration * (chunk_words / total_words)
              chunk_target_segments = max(3, round(chunk_expected_dur / TARGET_SEG_SECONDS))
              chunk_min_segments = max(3, math.ceil(chunk_expected_dur / 8))

              print(f"\nAnalyzing Audio {label} (~{chunk_expected_dur:.1f}s, target ~{chunk_target_segments} segmen, min {chunk_min_segments})...")

              prompt = base_prompt_template.format(
                  text_chunk=chunk_text,
                  expected_duration=chunk_expected_dur,
                  target_segments=chunk_target_segments,
                  min_segments=chunk_min_segments
              )
              data = analyze_chunk(audio, prompt, system_instruction, label, chunk_expected_dur, chunk_min_segments)
              combined_segments.extend(data.get("segments", []))
              summary_parts.append(data.get("summary", ""))

          combined_summary = " | ".join(summary_parts)

          metadata_system_instruction = f"""
          You are an elite YouTube growth strategist, SEO copywriter, and master thumbnail Art Director for premium psychology/documentary-style channels (the kind of visual language used by top-tier Netflix psychological documentaries and high-end editorial magazine covers).

          Your job: given the full narration script and its psychological summary, produce YouTube upload metadata that maximizes click-through-rate AND audience satisfaction -- the video must genuinely deliver on whatever curiosity or promise the title/thumbnail creates. The goal is "irresistible but honest": the kind of hook that is actually the real answer to the exact question a curious viewer already has in their head. Never promise something the narrative does not actually deliver.

          OUTPUT LANGUAGE: youtube_title, youtube_description, youtube_tags, and any on-image typography inside thumbnail_prompt must all be written in fluent, native-level {LANGUAGE}. Write as a native speaker, never a stiff translation.

          TITLE REQUIREMENTS:
          - 50-70 characters. Front-load the most curiosity-inducing or emotionally charged phrase.
          - Use a provocative psychological claim or question when it genuinely matches the content. Numbers/power-words are welcome if relevant.
          - Strong SEO: naturally weave in the real search terms a curious viewer would type, in {LANGUAGE}.

          DESCRIPTION REQUIREMENTS:
          - 150-300 words.
          - The first 2 sentences must work as a strong SEO + curiosity hook (this is the part shown before "show more").
          - Naturally include 3-5 relevant keyword phrases (not stuffed/repeated unnaturally).
          - Briefly state what the viewer will learn, feel, or realize by watching. End with a soft call-to-action.

          TAGS REQUIREMENTS:
          - 12-20 tags, ordered most-relevant-first, mixing broad terms with specific phrases tied to this exact topic. Tags may stay in their most search-natural language (mix {LANGUAGE} and English search terms is fine here, since tags are not user-facing prose).

          THUMBNAIL_PROMPT REQUIREMENTS -- treat this as a precise Art Director brief for a premium YouTube thumbnail. The output must be a complete, implementation-ready image description that a generative AI can execute exactly.

          MANDATORY LAYOUT BLUEPRINT (non-negotiable, the composition is always split into two zones):

          LEFT ZONE (35-42% of total width): Contains ONLY the typography stack. Clean white background. No character, no metaphor element enters this zone. Typography must be large enough to dominate at thumbnail size.

          RIGHT ZONE (58-65% of total width): Contains the primary character plus all visual elements (metaphors, antagonist, symbolic details, background). The character's face must remain clearly visible and never covered.

          STEP 1 — TYPOGRAPHY (design this first, then build the image around it):
          - Main headline: 2-3 short lines of stacked ALL-CAPS bold condensed sans-serif text in {LANGUAGE}. Each line on its own row, progressively building the hook. Line 1: matte black (#111111). Line 2: the most emotionally charged phrase — deep crimson red (#C62828 or #D32F2F). Line 3: largest text in the stack, completing the hook — same crimson or even bolder. Distressed ink texture, rough letterpress grain, strong drop shadow slightly below-right. All lines left-aligned, tight letter-spacing.
          - Subtitle block: placed below the main headline with a gap of roughly one line-height. A rough horizontal black paintbrush stroke rectangle (hand-painted texture) sits behind white ALL-CAPS subtitle text in a slightly smaller bold font (e.g. "TAPI KAMU TIDAK PERNAH" for Indonesian or "BUT YOU NEVER" for English). Immediately below this brushstroke block, one line of bold crimson uppercase text slightly larger than the subtitle (e.g. "MENYADARINYA" or "REALIZED IT") — no background behind this line, just text against the white zone.
          - Typography must be 100% legible at 320px wide (mobile thumbnail). Never overlap the character's face. Generous safe margin (at least 8% of total width) on all sides of the text.

          STEP 2 — PRIMARY CHARACTER (right zone, slightly left-of-center in right zone):
          - A highly expressive young adult (gender and specific look tailored to the narrative's emotional core — do not default to the same archetype every video). Anime-influenced illustration style: slightly oversized emotive eyes that convey the core emotion of the video's psychological twist in a single glance, stylized anatomy, cinematic editorial polish.
          - One unmistakable strong physical gesture that literalizes the narrative's core tension (e.g. both hands gripping the sides of the skull as internal pressure builds, one hand reaching toward a vanishing reflection, fingers pressed against a cracking surface). This gesture is the emotional anchor of the entire image.
          - Dark richly saturated clothing (navy, charcoal, or deep teal) to contrast against the white background. Face well-lit with dramatic directional lighting.

          STEP 3 — CORE SURREAL METAPHOR (the single most powerful visual invention, unique to THIS topic):
          - Invent one specific surreal literalization of the psychological core of this exact narrative. Never reuse generic metaphors across different topics. The metaphor must emerge directly from the spoken content. Examples of originality (do not copy, only use as inspiration of specificity level): skull opened to reveal a glowing gold labyrinthine maze-brain with puppet strings descending from a faceless figure above; fractured mirrors behind the character each showing a different divergent self with kintsugi gold cracks running between the shards; clock hands made of the character's own fingerprints dissolving into smoke; neural-circuit roots growing down from the brain into an underground cage of equations.
          - The metaphor must be visually complex but instantly readable at thumbnail scale — no fine detail that disappears when shrunk.

          STEP 4 — SECONDARY ANTAGONIST or PRESSURE ELEMENT (when the narrative involves external manipulation or social pressure):
          - A partially visible, deliberately ambiguous second figure (only torso and hands visible, face cropped out of frame or turned away): faceless authority, looming silhouette, puppet master. Positioned above or behind the character. Hands extended with some form of control mechanism (strings, geometric constraints, radiating pressure lines). Rendered in darker navy/charcoal to visually recede behind the primary character.

          STEP 5 — SUPPORTING SYMBOLIC SCATTER (5-8 small elements, topic-specific):
          - A constellation of small symbolic objects floating in the right zone's background space, each one directly relevant to this video's specific psychological theme. Examples of the specificity required: a cracked antique brass compass indicating lost direction; Polaroid photographs showing distorted alternative memories; geometric warning triangles with exclamation marks; neural network node-and-line diagrams; fragmented architectural blueprints; broken pocket watches. Never generic decorations — every element must earn its place by referencing something from the narrative.

          STEP 6 — ENVIRONMENT & COLOR:
          - Background: pure clinical white (#FFFFFF) with ultra-thin light-gray geometric grid lines (0.5px weight, barely visible), subtle architectural line art suggesting depth and scale. Consistent with premium editorial documentary aesthetic. No gradients, no noise, no photographic texture.
          - Strict color palette: pure white, midnight navy (#0D1B2A), charcoal black (#111111), metallic gold (#C9A84C), deep crimson (#C62828), muted sage or slate grey for secondary accents only. Every color must serve a purpose — no decorative color choices.
          - Lighting: dramatic single-source cinematic lighting from upper-right, creating crisp deep shadows on the left side of the character's face and form. High-contrast, premium, documentary-grade.

          STEP 7 — FINAL BRIEF:
          - Write the thumbnail_prompt as one continuous flowing description (no numbered steps in the output) of 1,800-2,500 characters, moving from typography instructions → character → metaphor → antagonist → supporting elements → environment → lighting, in that order.
          - Do NOT mention resolution, quality, or aspect-ratio buzzwords anywhere in the output (e.g. no '8K', '4K', '16:9', 'ultra high resolution', 'masterpiece quality') — those are handled by the rendering pipeline.
          - Every adjective must be visually concrete and implementable, no vague praise words.

          Strictly output ONLY valid JSON matching the exact schema provided. No markdown wrappers.
          """

          metadata_prompt = """
          Here is the full narration script for this video:
          \"\"\"{raw_script}\"\"\"

          Here is the combined psychological analysis summary across all sections:
          \"\"\"{combined_summary}\"\"\"

          Based on the FULL content above, generate YouTube upload metadata and a special thumbnail concept following the Art Director brief in your system instructions exactly.

          Output must strictly follow this JSON structure:
          {{
            "youtube_title": "...",
            "youtube_description": "...",
            "youtube_tags": ["tag1", "tag2", "..."],
            "thumbnail_prompt": "..."
          }}
          """.format(raw_script=raw_script, combined_summary=combined_summary)

          print("\n" + "="*70)
          print(" GENERATING YOUTUBE METADATA & THUMBNAIL PROMPT ")
          print("="*70)

          metadata = generate_metadata_with_fallback(metadata_prompt, metadata_system_instruction)

          if not metadata:
              print("⚠️ Memakai metadata fallback generik karena semua model gagal.")
              metadata = {
                  "youtube_title": (raw_script.split(".")[0].strip()[:65] if raw_script else "A Deep Psychological Narrative"),
                  "youtube_description": "An immersive psychological narrative exploring the depths of the human mind, the subconscious, and the hidden architecture of our thoughts.",
                  "youtube_tags": ["psychology", "human behavior", "mind", "subconscious", "deep narrative", "philosophy"],
                  "thumbnail_prompt": "A minimalist 2D flat vector illustration of a single contemplative figure with avant-garde cartoonish proportions, facing a fractured mirror that reflects infinite distorted versions of themselves, deep midnight blue background, dramatic high-contrast vector shadows, bold rich terracotta clothing, ultra-thin light-gray architectural line art in the background, clinical white canvas, surreal psychological metaphor of identity fragmentation, premium editorial flat design aesthetic, no resolution or aspect ratio mentioned."
              }

          def clamp_text(text, max_len):
              """Pengaman: kalau teks kepanjangan, potong di akhir kalimat terdekat
              di bawah batas -- supaya tidak berisiko ditolak situs generator gambar
              karena melewati limit panjang yang tidak kita ketahui pasti."""
              text = (text or "").strip()
              if len(text) <= max_len:
                  return text
              cut = text[:max_len]
              last_period = cut.rfind(". ")
              return cut[:last_period + 1] if last_period > max_len * 0.6 else cut

          metadata["thumbnail_prompt"] = clamp_text(metadata.get("thumbnail_prompt", ""), 2600)

          print(f"Judul       : {metadata.get('youtube_title','')}")
          print(f"Tags        : {len(metadata.get('youtube_tags', []))} tags")
          print(f"Thumbnail   : {len(metadata.get('thumbnail_prompt',''))} karakter\n")

          final_analysis = {
              "summary": combined_summary,
              "segments": combined_segments,
              "youtube_title": metadata.get("youtube_title", ""),
              "youtube_description": metadata.get("youtube_description", ""),
              "youtube_tags": metadata.get("youtube_tags", []),
              "thumbnail_prompt": metadata.get("thumbnail_prompt", "")
          }

          os.makedirs("release", exist_ok=True)
          with open("release/analysis.json", "w", encoding="utf8") as f:
              json.dump(final_analysis, f, indent=2, ensure_ascii=False)

          print("\n" + "="*70)
          print(f"SUCCESS: Combined analysis.json saved with {len(combined_segments)} total segments!")
          print("="*70)
          PYEOF

      - name: Generate Images (Parallel)
        run: |
          cat > generate-images.js <<'EOF'
          const { chromium } = require("playwright");
          const fs = require("fs");
          const sharp = require("sharp");

          const analysis = JSON.parse(
              fs.readFileSync("release/analysis.json", "utf8")
          );
          const segments = analysis.segments;
          const MAX_WORKERS = 5;
          const COOLDOWN_EVERY = 30;
          const COOLDOWN_MS = 45000;

          fs.mkdirSync("release/images", { recursive: true });

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          let completedCount = 0;
          let cooldownPromise = null;

          async function maybeCooldown() {
              if (cooldownPromise) {
                  await cooldownPromise;
                  return;
              }
              completedCount++;
              if (completedCount % COOLDOWN_EVERY === 0) {
                  console.log(`\n⏳ ${completedCount} gambar selesai. Cooldown ${COOLDOWN_MS / 1000}s untuk menghindari overload freegen.app...\n`);
                  cooldownPromise = sleep(COOLDOWN_MS).then(() => { cooldownPromise = null; });
                  await cooldownPromise;
              }
          }

          async function generateUpsampler(page, prompt, outPath) {
              for (let retry = 1; retry <= 2; retry++) {
                  try {
                      await page.goto("https://upsampler.com/free-image-generator-no-signup", {
                          waitUntil: "domcontentloaded"
                      });
                      await page.waitForLoadState("networkidle").catch(() => {});

                      await page.locator("#aspect-ratio").click();
                      await page.getByRole("option", { name: /16:9/i }).first().click();

                      await page.locator("#prompt-input").fill(prompt);

                      const generateBtn = page.getByRole("button", { name: "Generate Image" });
                      await generateBtn.waitFor({ state: "visible" });
                      await generateBtn.click();

                      const resultImg = page.locator('img[alt="generated image"]');
                      await resultImg.waitFor({ state: "visible", timeout: 120000 });

                      const newImgSrc = await resultImg.getAttribute("src");
                      if (!newImgSrc) throw new Error("src gambar hasil kosong");

                      const resp = await page.request.get(newImgSrc);
                      const rawBuffer = await resp.body();
                      const jpegBuffer = await sharp(rawBuffer).jpeg({ quality: 92 }).toBuffer();
                      fs.writeFileSync(outPath, jpegBuffer);

                      console.log("✓", outPath, "(upsampler.com)");
                      return true;
                  } catch (err) {
                      console.log(`[Upsampler] Retry ${retry}: ${err.message}`);
                      if (retry === 2) {
                          try {
                              await page.screenshot({ path: outPath.replace(/\.jpg$/, ".upsampler-debug.png"), fullPage: true });
                              const bodyText = await page.locator("body").innerText().catch(() => "(gagal ambil teks halaman)");
                              fs.writeFileSync(outPath.replace(/\.jpg$/, ".upsampler-debug.txt"), bodyText.slice(0, 3000));
                          } catch (debugErr) {
                              console.log("Gagal ambil screenshot debug:", debugErr.message);
                          }
                      }
                  }
              }
              return false;
          }

          async function generate(page, prompt, outPath) {
              try {
                  await page.goto("https://freegen.app/", {
                      waitUntil: "domcontentloaded"
                  });
                  await page.waitForLoadState("networkidle").catch(() => {});

                  await page.selectOption("#aspectRatioSelect", "16:9");
                  await page.fill("#prompt", prompt);
                  await page.keyboard.press("Enter");

                  const imageContainer = page.locator("#imageContainer");
                  await imageContainer.waitFor({ timeout: 90000 });

                  const img = imageContainer.locator("img");
                  const src = await img.getAttribute("src");
                  const base64 = src.replace(/^data:image\/[a-z]+;base64,/, "");

                  fs.writeFileSync(outPath, base64, "base64");

                  console.log("✓", outPath);
                  return true;
              } catch (err) {
                  console.log(`[freegen.app] Gagal: ${err.message} -- langsung dilempar ke fallback upsampler.com (worker 6)`);
                  try {
                      await page.screenshot({ path: outPath.replace(/\.jpg$/, ".debug.png"), fullPage: true });
                      const bodyText = await page.locator("body").innerText().catch(() => "(gagal ambil teks halaman)");
                      fs.writeFileSync(outPath.replace(/\.jpg$/, ".debug.txt"), bodyText.slice(0, 3000));
                  } catch (debugErr) {
                      console.log("Gagal ambil screenshot debug:", debugErr.message);
                  }
                  return false;
              }
          }

          const failedQueue = [];
          let primaryWorkersDone = false;

          async function worker(id, browser, queue) {
              const page = await browser.newPage();
              while (true) {
                  const index = queue.shift();
                  if (index === undefined) break;
                  console.log(`\nWorker ${id} -> segmen ${index+1}/${segments.length}`);
                  console.log(`${segments[index].start} -> ${segments[index].end}`);
                  const outPath = `release/images/${String(index+1).padStart(3, "0")}.jpg`;
                  const ok = await generate(page, segments[index].image_prompt, outPath);
                  if (!ok) {
                      failedQueue.push({ index, prompt: segments[index].image_prompt, outPath });
                  }
                  await maybeCooldown();
              }
              await page.close();
          }

          async function upsamplerWorker(browser) {
              const page = await browser.newPage();
              let processed = 0;
              while (!primaryWorkersDone || failedQueue.length > 0) {
                  if (failedQueue.length === 0) {
                      await sleep(1000);
                      continue;
                  }
                  const job = failedQueue.shift();
                  console.log(`\nWorker 6 (upsampler.com fallback) -> segmen ${job.index+1}/${segments.length} (freegen.app gagal)`);
                  const ok = await generateUpsampler(page, job.prompt, job.outPath);
                  if (!ok) {
                      fs.writeFileSync(
                          job.outPath.replace(/\.jpg$/, ".error.txt"),
                          `Gagal di freegen.app dan upsampler.com untuk segmen ${job.index+1}.`
                      );
                      console.log(`⚠️ Segmen ${job.index+1} gagal total di kedua provider.`);
                  }
                  processed++;
              }
              await page.close();
              if (processed > 0) {
                  console.log(`\nWorker 6 (upsampler.com) selesai memproses ${processed} gambar fallback.`);
              }
          }

          (async () => {
              console.log("\n==============================");
              console.log("IMAGE GENERATOR");
              console.log("==============================");
              console.log(`Workers  : ${MAX_WORKERS} (freegen.app) + 1 (upsampler.com fallback live)`);
              console.log(`Segments : ${segments.length}`);
              console.log(`Cooldown : ${COOLDOWN_MS / 1000}s tiap ${COOLDOWN_EVERY} gambar`);

              const browser = await chromium.launch({ headless: true });

              if (analysis.thumbnail_prompt) {
                  console.log("\n--- Generating THUMBNAIL (prioritas pertama, via upsampler.com) ---");
                  const thumbPage = await browser.newPage();
                  let ok = await generateUpsampler(thumbPage, analysis.thumbnail_prompt, "release/thumbnail.jpg");
                  if (!ok) {
                      console.log("⚠️ upsampler.com gagal, coba fallback ke freegen.app untuk thumbnail...");
                      ok = await generate(thumbPage, analysis.thumbnail_prompt, "release/thumbnail.jpg");
                  }
                  await thumbPage.close();
                  if (ok) {
                      console.log("✓ Thumbnail berhasil dibuat\n");
                  } else {
                      console.log("⚠️ Thumbnail gagal dibuat dari upsampler.com maupun freegen.app.");
                      console.log("   Cek release/thumbnail.upsampler-debug.png/.txt dan release/thumbnail.debug.png/.txt untuk diagnosis.");
                      console.log("   Akan dipakai gambar segmen pertama yang sukses sebagai fallback.\n");
                  }
              } else {
                  console.log("\n⚠️ Tidak ada thumbnail_prompt di analysis.json, skip pembuatan thumbnail.\n");
              }

              const queue = Array.from({ length: segments.length }, (_, i) => i);

              const fallbackWorker = upsamplerWorker(browser);
              
              await Promise.all(
                  Array.from(
                      { length: Math.min(MAX_WORKERS, segments.length) },
                      (_, i) => worker(i + 1, browser, queue)
                  )
              );
              
              primaryWorkersDone = true;
              
              await fallbackWorker;
              
              await browser.close();
              
              console.log("\nDONE");
              
              process.exit(0);
              
              })();
          })();
          EOF
          
          node generate-images.js

