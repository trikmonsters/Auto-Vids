                          const jobId   = genData.job_id;
                          const hashHex = crypto.createHash('sha256').update(jobId + ts).digest('hex');
                          const auth    = Buffer.from(hashHex).toString('base64').substring(0, 20) + ':' + ts;
                          const ok = await new Promise((resolve) => {
                              const ws    = new WebSocket('wss://websocket-bridge.freegen.app/ws');
                              const timer = setTimeout(() => { ws.terminate(); resolve(false); }, 300000);

