                          method: 'POST',
                          headers: { 'Content-Type': 'application/json' },
                          body: JSON.stringify({ prompt, ts, sig, ratio_id: FREEGEN_RATIO })
                      });
                      if (!genRes.ok) throw new Error(`Generator HTTP ${genRes.status}`);
                      const genData = await genRes.json();

                      if (genData.image_data_url) {
                          const imgRes = await fetch(genData.image_data_url);
                          const buffer = Buffer.from(await imgRes.arrayBuffer());
