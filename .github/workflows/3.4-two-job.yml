name: Vids 3.4 Flash MultiJobs

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Masukkan Judul atau Topik Narasi (Psychology)"
        required: true
        type: string
      language:
        description: "Bahasa narasi, audio, metadata & thumbnail"
        required: false
        type: choice
        options:
          - Indonesian
          - English
        default: "English"
      voice:
        description: "Gemini Voice — untuk English pilih Aoede/Puck, untuk Indonesian pilih Sulafat/Leda"
        required: false
        type: choice
        options:
          - Aoede
          - Puck
          - Sulafat
          - Leda
          - Kore
          - Charon
          - Fenrir
          - Schedar
        default: "Aoede"
      paragraph_gap:
        description: "Gap antar paragraf (detik)"
        required: false
        default: "1"
      youtube_privacy:
        description: "Status privasi video YouTube"
        required: false
        type: choice
        options:
          - private
          - unlisted
          - public
        default: "public"

permissions:
  contents: write

jobs:

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      TOPIC_INPUT: ${{ github.event.inputs.topic }}
      VOICE_NAME: ${{ github.event.inputs.voice }}
      LANGUAGE: ${{ github.event.inputs.language }}
      PARA_GAP: ${{ github.event.inputs.paragraph_gap }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai google-api-python-client google-auth google-auth-oauthlib

      - name: Setup Node.js and Install Dependencies
        run: |
          npm init -y
          npm install playwright sharp ws
          npx playwright install chromium

      - name: Prepare Workspace
        run: |
          mkdir -p output release

      - name: Generate Narrative via Gemini API
        run: |
          cat << 'EOF' > request.json
          {
            "model": "models/gemini-3.5-flash",
            "input": "You are a combination of an elite YouTube Growth Strategist, a rigorous behavioral scientist, and a master of psychological narrative design. Write a highly immersive, continuous psychological narrative in fluent, native-level ${{ github.event.inputs.language }} based on this raw topic data: \"${{ github.event.inputs.topic }}\"\n\nSTRICT FACTUAL & SEO GUARDRAILS (ALGORITHM AUTHORITY LOCK):\n\n1. ANCHOR ON FACTS: The narrative must be strictly rooted in real, proven psychological phenomena, cognitive biases, or evolutionary biology data. Do not invent fake science or wild fictions.\n2. SEO KEYWORD RETENTION: Intelligently weave core semantic keywords related to \"${{ github.event.inputs.topic }}\" naturally throughout the text.\n3. ANTI-TOPIC CHAOS: Maintain strict thematic consistency.\n\nSTRICT NARRATIVE & RETENTION RULES:\n\n1. HOOK TECHNIQUE (START IN THE MIDDLE): Do not start with a greeting.\n2. VALUE RETENTION: Open by delivering the second-best insight.\n3. Every subsequent paragraph must begin with a cold psychological insight.\n4. Treat human emotions as physical phenomena.\n\nSTRICT TTS-PIPELINE FORMAT RULES:\n\n1. Every paragraph begins with a TTS directive.\n2. Every paragraph only 2-3 sentences.\n3. Every tag must contain \"STRICTLY SLOW pace\".\n4. Output ONLY the narrative. Target 2000+ words and max 3000 words.\n\nCYCLE THROUGH THESE EXACT TAGS:\n\n- Paragraph 1: [hook tone, commanding volume, STRICTLY SLOW pace, start in the middle delivery]\n- Alternate:\n[cold analytical tone, piercing delivery, STRICTLY SLOW pace, deliberate pauses]\n[assertive tone, exposing the truth, STRICTLY SLOW pace, heavy cadence]\n[chilling tone, psychological exposure, cynical edge, STRICTLY SLOW calculated delivery]\n[rhetorical tone, STRICTLY SLOW pace, long philosophical pause]\n- Final:\n[final authoritative tone, heavy cadence, EXTREMELY SLOW powerful conclusion]\n\nCRITICAL SAFETY VALVE:\n- No assistant text.\n- No follow-up.\n- End immediately after the final word.",
            "generation_config": {
              "max_output_tokens": 65536,
              "thinking_level": "high"
            }
          }
          EOF

          API_KEYS=("${GEMINI_API_KEY}" "${GEMINI_API_KEY_2}" "${GEMINI_API_KEY_3}")
          MODELS=("gemini-3.5-flash" "gemini-3.1-flash-lite")
          SUCCESS=false
          MAX_RETRY=3

          for i in "${!API_KEYS[@]}"; do
            KEY="${API_KEYS[$i]}"
            [ -z "$KEY" ] && continue

            for m in "${!MODELS[@]}"; do
              MODEL="${MODELS[$m]}"

              for retry in $(seq 1 $MAX_RETRY); do
                echo "======================================"
                echo "Key $((i+1)) | Model: $MODEL | Retry $retry/$MAX_RETRY"
                echo "======================================"

                # Update model di request.json
                jq --arg m "models/$MODEL" '.model = $m' request.json > request_tmp.json && mv request_tmp.json request.json

                curl -s -X POST \
                  -H "Content-Type: application/json" \
                  "https://generativelanguage.googleapis.com/v1beta/interactions?key=${KEY}" \
                  -d @request.json \
                  -o response.json

                # Cek apakah error 503/overload
                ERROR_MSG=$(cat response.json | head -c 300)
                if echo "$ERROR_MSG" | grep -qi "high demand\|overload\|temporarily\|503\|UNAVAILABLE"; then
                  echo "⚠️ Server overload untuk $MODEL. Tunggu 20 detik lalu retry..."
                  sleep 20
                  continue
                fi

                # Cek apakah error kuota/429
                if echo "$ERROR_MSG" | grep -qi "quota\|429\|RESOURCE_EXHAUSTED\|rate limit"; then
                  echo "⚠️ Kuota Key $((i+1)) habis untuk $MODEL, coba model berikutnya..."
                  break
                fi

                WORDS=$(jq -r '.steps[] | select(.type=="model_output") | .content[] | select(.type=="text") | .text' response.json 2>/dev/null | wc -w)
                if [ "${WORDS:-0}" -gt 100 ] 2>/dev/null; then
                  jq -r '.steps[] | select(.type=="model_output") | .content[] | select(.type=="text") | .text' response.json > tts-script.txt
                  echo "✓ Berhasil — Key $((i+1)) | Model: $MODEL | $WORDS kata"
                  SUCCESS=true
                  break 3
                else
                  echo "⚠️ Response tidak valid ($MODEL): $ERROR_MSG"
                fi
              done

              [ "$SUCCESS" = "true" ] && break
            done

            [ "$SUCCESS" = "true" ] && break
            echo "↩ Semua model Key $((i+1)) gagal, pindah ke Key $((i+2))..."
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ Semua API key dan model gagal. Pipeline dihentikan."
            exit 1
          fi

          echo "======================================"
          echo "Generated Words : $(wc -w < tts-script.txt)"
          echo "======================================"
          cat tts-script.txt


      - name: Generate TTS Audio (REST API & Sequential Safe Mode)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: |
          python3 << 'PYEOF'
          import os, re, json, time, textwrap, struct, wave, base64
          import urllib.request
          import urllib.error

          API_KEYS = [k for k in [
                          os.environ.get("GEMINI_API_KEY"),
                          os.environ.get("GEMINI_API_KEY_2"),
                          os.environ.get("GEMINI_API_KEY_3"),
                      ] if k]
          if not API_KEYS:
              print("❌ Tidak ada API key yang tersedia."); exit(1)

          TTS_MODELS = [
              "gemini-2.5-flash-preview-tts",
              "gemini-3.1-flash-tts-preview",
          ]

          VOICE          = os.environ["VOICE_NAME"]
          LANGUAGE_LABEL = os.environ.get("LANGUAGE", "Indonesian")
          GAP            = float(os.environ.get("PARA_GAP", "1"))

          SAMPLE_RATE    = 24000
          CHANNELS       = 1
          SAMPLE_WIDTH   = 2
          TARGET_WORDS   = 550
          DELAY_SECONDS  = 30

          print("\n" + "="*70)
          print(" GEMINI TTS - REST API & SEQUENTIAL SAFE MODE ")
          print("="*70)
          print(f"Keys     : {len(API_KEYS)}")
          print(f"Models   : {TTS_MODELS}")

          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw = f.read().strip()

          def clean_text(text):
              return re.sub(r"['\"`]", "", text).strip()

          single_paragraphs = [p.strip() for p in raw.split("\n\n") if p.strip()]
          if not single_paragraphs:
              print("Error: No paragraphs found!"); exit(1)

          paragraphs = []
          cur, cur_w = [], 0
          for p in single_paragraphs:
              wc = len(p.split())
              if cur_w + wc > TARGET_WORDS and cur:
                  paragraphs.append("\n\n".join(cur))
                  cur, cur_w = [], 0
              cur.append(p)
              cur_w += wc
          if cur: paragraphs.append("\n\n".join(cur))

          print(f"Voice    : {VOICE}")
          print(f"Batches  : {len(paragraphs)} (Max {TARGET_WORDS} words/batch)")
          print(f"Strategy : Sequential 1-by-1 with {DELAY_SECONDS}s delay\n")

          def build_voice_prompt(text):
              cleaned = clean_text(textwrap.dedent(text))
              return f"""Read the following transcript based on the audio profile and director's note. Maintain a 100% stable, robust, and well-mastered output volume from the very first word to the absolute last word. Prevent any automatic volume fade-outs at the end of sentences by sustaining vocal presence during pauses.

          # Audio Profile
          An elite, cold, and deeply analytical narrator for a premium YouTube Dark Psychology channel. The voice is deep, commanding, highly intellectual, and speaks directly into the listener's mind with absolute authority.
          
          # Director's note
          - Style: Academic yet chilling, authoritative, crystal-clear articulation with a professional broadcast cadence.
          - Pace: Calculated and deliberate. Uses strategic, brief pauses after punctuation to let the weight of the words sink in.
          - Accent: Neutral, flawless English.
          - Volume: Fixed, full-bodied amplitude. No whispering that drops below baseline decibels, no robotic flatness.
          
          ## Transcript:
          {cleaned}"""

          def silence(sec):
              n = int(SAMPLE_RATE * sec)
              return struct.pack(f"<{n}h", *([0]*n))

          def try_tts(payload, key, model):
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={key}"
              req = urllib.request.Request(
                  url,
                  data=json.dumps(payload).encode('utf-8'),
                  headers={'Content-Type': 'application/json'},
                  method='POST'
              )
              with urllib.request.urlopen(req, timeout=180) as resp:
                  res_json = json.loads(resp.read())
              b64 = res_json['candidates'][0]['content']['parts'][0]['inlineData']['data']
              return base64.b64decode(b64)

          pcm_data = []

          for i, chunk in enumerate(paragraphs):
              print("-" * 70)
              print(f"Mengeksekusi Batch {i+1}/{len(paragraphs)} ({len(chunk.split())} kata)")

              payload = {
                  "contents": [{"role": "user", "parts": [{"text": build_voice_prompt(chunk)}]}],
                  "generationConfig": {
                      "responseModalities": ["AUDIO"],
                      "temperature": 0.7,
                      "speechConfig": {"voiceConfig": {"prebuiltVoiceConfig": {"voiceName": VOICE}}}
                  }
              }

              success = False
              for key_idx, key in enumerate(API_KEYS):
                  for model_idx, model in enumerate(TTS_MODELS):
                      try:
                          print(f"  [Key {key_idx+1}/{len(API_KEYS)} | Model {model_idx+1}/{len(TTS_MODELS)}: {model}] Mengirim request...")
                          audio_bytes = try_tts(payload, key, model)
                          pcm_data.append(audio_bytes)
                          print(f"  ✓ Berhasil dengan Key {key_idx+1} + {model} — {len(audio_bytes)} bytes audio.")
                          success = True
                          break
                      except urllib.error.HTTPError as e:
                          err_msg = e.read().decode('utf-8')
                          print(f"  ⚠️ HTTP {e.code} (Key {key_idx+1} | {model}): {err_msg[:120]}")
                          if e.code == 503:
                              print(f"  → Model {model} overload, coba model berikutnya...")
                          elif e.code == 429 or e.code == 403:
                              print(f"  → Key {key_idx+1} kuota habis untuk {model}, coba model berikutnya...")
                          else:
                              time.sleep(10)
                      except Exception as e:
                          print(f"  ⚠️ Error (Key {key_idx+1} | {model}): {str(e)[:120]}")
                          time.sleep(10)
                  if success:
                      break
                  if key_idx < len(API_KEYS) - 1:
                      print(f"  ↩ Semua model Key {key_idx+1} gagal, pindah ke Key {key_idx+2}...")

              if not success:
                  print(f"\n❌ FATAL: Batch {i+1} gagal di semua key dan model. Pipeline dihentikan.")
                  exit(1)

              # JEDA SEKUENSIAL YANG AMAN
              if i < len(paragraphs) - 1:
                  pcm_data.append(silence(GAP))
                  print(f"  ⏳ Menunggu {DELAY_SECONDS} detik secara berurutan agar aman dari limit RPM...")
                  time.sleep(DELAY_SECONDS)

          # --- Simpan File Audio Langsung ke WAV format 16-bit PCM ---
          out_file = "output/audio.wav"
          with wave.open(out_file, "wb") as wf:
              wf.setnchannels(CHANNELS)
              wf.setsampwidth(SAMPLE_WIDTH)
              wf.setframerate(SAMPLE_RATE)
              wf.writeframes(b"".join(pcm_data))

          duration = sum(len(x) for x in pcm_data) / (SAMPLE_RATE * SAMPLE_WIDTH)

          print("\n" + "="*70)
          print(" SUCCESS: AUDIO GENERATION COMPLETED ")
          print("="*70)
          print(f"Output   : {out_file}")
          print(f"Duration : {duration:.1f} seconds\n")
          PYEOF

      - name: Analyze Audio (Chunked Process)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          LANGUAGE: ${{ github.event.inputs.language }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import time
          import math
          import wave
          import threading
          import textwrap
          from google import genai
          from google.genai import types
          from google.genai import errors as genai_errors

          LANGUAGE = os.environ.get("LANGUAGE", "Indonesian")

          _api_keys = [k for k in [
              os.environ.get("GEMINI_API_KEY"),
              os.environ.get("GEMINI_API_KEY_2"),
              os.environ.get("GEMINI_API_KEY_3"),
          ] if k]
          if not _api_keys:
              print("❌ Tidak ada API key yang tersedia."); exit(1)
          _key_idx = [0]

          def get_client():
              return genai.Client(api_key=_api_keys[_key_idx[0]])

          def rotate_key(reason=""):
              next_idx = (_key_idx[0] + 1) % len(_api_keys)
              if next_idx != _key_idx[0]:
                  print(f"  ↩ Key {_key_idx[0]+1} {reason}, pindah ke Key {next_idx+1}...")
                  _key_idx[0] = next_idx
                  return True
              print(f"  ⚠️ Semua key sudah dicoba ({reason})")
              return False

          client = get_client()

          MODEL_LIST = [
              "gemini-3.5-flash",
              "gemini-3.1-flash-lite",
              "gemini-3-flash-preview",
              "gemma-4-26b-a4b-it",
              "gemma-4-31b-it",
          ]
          MAX_ROUNDS = 3

          def analyze_chunk(audio_file, prompt, sys_instruction, label, expected_duration=None, min_segments_needed=None):
              last_error = None
              for round_num in range(1, MAX_ROUNDS + 1):
                  for model_name in MODEL_LIST:
                      print(f"[{label}] Round {round_num}/{MAX_ROUNDS} -> mencoba model: {model_name}")
                      try:
                          response = get_client().models.generate_content(
                              model=model_name,
                              contents=[audio_file, prompt],
                              config=types.GenerateContentConfig(
                                  system_instruction=sys_instruction,
                                  response_mime_type="application/json"
                              )
                          )
                          data = json.loads(response.text)
                          segments = data.get("segments", [])
                          total_seg_dur = sum(float(s.get("duration", 0) or 0) for s in segments)

                          if expected_duration and min_segments_needed:
                              if len(segments) < min_segments_needed or total_seg_dur < expected_duration * 0.6:
                                  raise ValueError(
                                      f"Hasil under-segmented: {len(segments)} segmen (butuh >= {min_segments_needed}), "
                                      f"total durasi segmen {total_seg_dur:.1f}s vs ekspektasi ~{expected_duration:.1f}s"
                                  )

                          print(f"  ✓ [{label}] Berhasil dengan model {model_name} ({len(segments)} segments, total {total_seg_dur:.1f}s)")
                          return data
                      except genai_errors.APIError as e:
                          last_error = e
                          if e.code in (503, 500):
                              print(f"  ⚠️ {model_name} overload (HTTP {e.code}), lanjut ke model berikutnya...")
                          elif e.code in (429, 403):
                              rotated = rotate_key("kuota habis")
                              print(f"  ⚠️ {model_name} kena limit kuota (HTTP {e.code}), {'pindah key' if rotated else 'semua key habis'}")
                          else:
                              print(f"  ⚠️ {model_name} APIError {e.code}: {str(e)[:200]}")
                      except ValueError as e:
                          last_error = e
                          msg = str(e)
                          if "under-segmented" in msg:
                              print(f"  ⚠️ {model_name}: {msg}, lanjut ke model berikutnya...")
                          else:
                              print(f"  ⚠️ {model_name} ValueError: {msg[:200]}")
                      except Exception as e:
                          last_error = e
                          print(f"  ⚠️ {model_name} error: {str(e)[:200]}")

                  if round_num < MAX_ROUNDS:
                      wait = 30 * round_num
                      print(f"[{label}] Semua {len(MODEL_LIST)} model gagal di round {round_num}. Menunggu {wait}s lalu mengulang dari model pertama...")
                      time.sleep(wait)

              print(f"[{label}] ⚠️ GAGAL TOTAL setelah {MAX_ROUNDS} putaran x {len(MODEL_LIST)} model. Error terakhir: {last_error}")
              return {"summary": f"Analisis {label} gagal total setelah semua model & retry dicoba.", "segments": []}

          def generate_metadata_with_fallback(prompt, sys_instruction):
              last_error = None
              for round_num in range(1, MAX_ROUNDS + 1):
                  for model_name in MODEL_LIST:
                      print(f"[YouTube Metadata] Round {round_num}/{MAX_ROUNDS} -> mencoba model: {model_name}")
                      try:
                          response = get_client().models.generate_content(
                              model=model_name,
                              contents=prompt,
                              config=types.GenerateContentConfig(
                                  system_instruction=sys_instruction,
                                  response_mime_type="application/json"
                              )
                          )
                          data = json.loads(response.text)
                          title = (data.get("youtube_title") or "").strip()
                          desc = (data.get("youtube_description") or "").strip()
                          tags = data.get("youtube_tags") or []
                          thumb = (data.get("thumbnail_prompt") or "").strip()

                          if len(title) < 10:
                              raise ValueError("youtube_title terlalu pendek/kosong")
                          if len(desc) < 80:
                              raise ValueError("youtube_description terlalu pendek/kosong")
                          if len(tags) < 5:
                              raise ValueError("youtube_tags terlalu sedikit (<5)")
                          if len(thumb) < 300:
                              raise ValueError("thumbnail_prompt terlalu pendek/kosong")

                          print(f"  ✓ [YouTube Metadata] Berhasil dengan model {model_name}")
                          return data
                      except genai_errors.APIError as e:
                          last_error = e
                          if e.code in (503, 500):
                              print(f"  ⚠️ {model_name} overload (HTTP {e.code}), lanjut ke model berikutnya...")
                          elif e.code in (429, 403):
                              rotated = rotate_key("kuota habis")
                              print(f"  ⚠️ {model_name} kena limit kuota (HTTP {e.code}), {'pindah key' if rotated else 'semua key habis'}")
                          else:
                              print(f"  ⚠️ {model_name} APIError {e.code}: {str(e)[:200]}")
                      except Exception as e:
                          last_error = e
                          print(f"  ⚠️ {model_name} error/hasil tidak valid: {str(e)[:200]}")

                  if round_num < MAX_ROUNDS:
                      wait = 30 * round_num
                      print(f"[YouTube Metadata] Semua model gagal di round {round_num}. Menunggu {wait}s lalu mengulang...")
                      time.sleep(wait)

              print(f"[YouTube Metadata] ⚠️ GAGAL TOTAL setelah {MAX_ROUNDS} putaran. Error terakhir: {last_error}")
              return None

          print("\n" + "="*70)
          print(" AUDIO ANALYSIS (CHUNKED OMIT LIMIT MODE) ")
          print("="*70 + "\n")

          print("Uploading full audio...")
          audio = None
          for _upload_attempt in range(len(_api_keys) * 2):
              try:
                  audio = get_client().files.upload(file="output/audio.wav")
                  print(f"✓ Upload completed: {audio.uri}\n")
                  break
              except Exception as _e:
                  _msg = str(_e)
                  print(f"⚠️ Upload gagal (Key {_key_idx[0]+1}): {_msg[:120]}")
                  if "429" in _msg or "RESOURCE_EXHAUSTED" in _msg or "quota" in _msg.lower():
                      rotate_key("kuota habis saat upload")
                  time.sleep(10)
          if audio is None:
              print("❌ Upload audio gagal di semua key. Pipeline dihentikan.")
              exit(1)

          system_instruction = f"""
          You are an Elite Avant-Garde Creative Director and Master Cyber-Surrealist Artist specializing in world-class 2D modern flat vector illustration for deep psychological, philosophical, and high-intellect cinematic narratives.
          Your job is to translate complex emotional audio into a richly detailed, FINELY-GRAINED visual timeline (many short segments, never a few long ones) plus precise FFmpeg camera/transition directives.
          SEGMENTATION PRIORITY (READ THIS FIRST, IT IS NON-NEGOTIABLE):
          - Granularity is the top priority.
          Many short segments (3-8 seconds each) are strongly preferred over a few long ones.
          Hundreds of segments across the full narration is perfectly normal and encouraged — never compress multiple distinct sentences, images, or emotional beats into one oversized segment just to produce a shorter response.
          - Every meaningful shift in tone, imagery, sentence, or emotional beat in the narration deserves its own dedicated segment.
          - The sum of every segment's "duration" must add up to the EXACT total duration of the audio section given to you below.
          Never leave gaps, never exceed 8 seconds per segment.

          CRITICAL QUALITY MANDATE FOR IMAGE_PROMPT:
          - Every single 'image_prompt' MUST be an incredibly dense, ultra-detailed masterpiece, strictly between 1,800 and 2,500 characters long.
          Avoid generic, filler, or repeated phrasing — each one must vividly describe a genuinely distinct moment tied directly to that segment's spoken text.
          - DO NOT mention resolution, quality, or aspect-ratio buzzwords such as '8K', '4K', 'UHD', 'ultra high resolution', '16:9', or 'widescreen'.
          Aspect ratio and resolution are already configured separately in the rendering pipeline — wasting characters on this adds zero value.
          Spend every available character on substantive visual description instead.
          - RELEVANCE: The image_prompt must directly visualize what is being said in THAT exact segment's "text" field, not something generic or only loosely related.
          Re-read the segment's spoken text before writing its image_prompt.
          - ON-IMAGE TEXT: If you include any on-image text (such as the dynamic header), it must be written in {LANGUAGE}, matching the narration's language — never default to English unless {LANGUAGE} is English.
          - STYLE: Masterpiece 2D Modern Flat Vector Illustration, highly sophisticated editorial design style, clean geometric shapes, complex vector layering.
          NEVER use 'photorealistic', '3D render', 'hyperrealistic', 'skeuomorphic', or 'octane render'.
          - VISUAL DEPTH: The flat vector style must look premium, complex, and cinematic.
          Achieve this through multi-layered backgrounds, isometric perspectives, intricate geometric patterns, and rich textures created purely from flat vector shading.
          - CHARACTER DESIGN: The subject must be an expressive character with elegant, avant-garde cartoonish proportions (slightly enlarged head to amplify deep internal emotion, expressive eyes, stylized anatomy).
          Clothing must feature solid, rich, deeply saturated colors with crisp minimalist creases.
          - BACKGROUND & ENVIRONMENT: A striking, minimalist but highly detailed environment drawn with ultra-thin, precise light-gray and muted-ink lines.
          The setting must feel vast, atmospheric, and architectural, incorporating clean lines, perfect symmetry, or unsettling distorted perspectives on a pure clinical white canvas.
