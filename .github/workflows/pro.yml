name: Project Video AI

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "Masukkan Judul atau Topik Narasi (Psychology)"
        required: true
        type: string
      voice:
        description: "Gemini Voice"
        required: false
        default: "Sulafat"
      language:
        description: "Language"
        required: false
        default: "id-ID"
      paragraph_gap:
        description: "Gap antar paragraf (detik)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TOPIC_INPUT: ${{ github.event.inputs.topic }}
      VOICE_NAME: ${{ github.event.inputs.voice }}
      LANGUAGE: ${{ github.event.inputs.language }}
      PARA_GAP: ${{ github.event.inputs.paragraph_gap }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai

      - name: Setup Node.js and Install Dependencies
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Install FFmpeg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Prepare Workspace
        run: |
          mkdir -p output release

      - name: Generate script with Elite Narrative Design
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TOPIC_INPUT: ${{ github.event.inputs.topic }}
        run: |
          # System Prompt yang telah disempurnakan
          SYSTEM_PROMPT="You are a master of psychological subversion and narrative design. Your work functions like a cognitive trap: once the reader starts, they cannot look away. CRITICAL ENGAGEMENT MANDATE: 1. THE CEREBRAL HOOK: Every single paragraph must begin with a 'psychological hook'—a provocative, counter-intuitive, or startling observation about the human mind that immediately demands resolution in the next sentences. Never start with a generic question. Start with a cold, piercing insight. 2. NARRATIVE DENSITY: Every paragraph must be a dense, heavy block of text (minimum 4-6 long, complex sentences). No bullet points, no short lines, no white space between paragraphs. The text should feel like a relentless stream of consciousness. 3. ATMOSPHERIC PSYCHOLOGY: Treat human emotions as physical phenomena. Use architectural, biological, and quantum metaphors. 4. ABSOLUTE PROHIBITIONS: No 'In summary', 'In conclusion', 'It is important to remember', or 'Human behavior is complex'. No archetypal characters (no 'John' or 'Mary'). No generic advice. 5. THE TWIST: The narrative must escalate from a relatable psychological premise into a surreal, existential realization that leaves the reader questioning the architecture of their own mind."

          # User Prompt yang dipadukan dengan topik input
          USER_PROMPT="Write a 1500+ - 2000 word, highly immersive psychological narrative on the topic: '$TOPIC_INPUT'. Structure: - Every paragraph MUST begin with an aggressive, hook-driven insight. - Maintain a cold, cinematic, and sophisticated tone. - Ensure the narrative deepens into existential dread or profound discovery. - Use dense, academic-poetic language. Write in English."

          MAX_RETRIES=5
          SUCCESS=false

          echo "Topic     : $TOPIC_INPUT"
          echo "Model     : openrouter/owl-alpha"
          echo ""

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "========================================="
            echo "[Attempt $attempt/$MAX_RETRIES] Calling OpenRouter..."
            echo "========================================="

            HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" --max-time 120 \
              https://openrouter.ai/api/v1/chat/completions \
              -H "Authorization: Bearer $OPENROUTER_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n \
                --arg model "openrouter/owl-alpha" \
                --arg sp "$SYSTEM_PROMPT" \
                --arg up "$USER_PROMPT" \
                '{
                  model: $model,
                  messages: [{role: "system", content: $sp}, {role: "user", content: $up}],
                  temperature: 0.7,
                  max_tokens: 4000,
                  presence_penalty: 0.8,
                  frequency_penalty: 0.7
                }')")

            STORY_TEXT=$(jq -r '.choices[0].message.content // empty' response.json 2>/dev/null)
            ERROR_MSG=$(jq -r '.error.message // empty' response.json 2>/dev/null)

            if [ "$HTTP_CODE" = "200" ] && [ -n "$STORY_TEXT" ]; then
              printf '%s' "$STORY_TEXT" > tts-script.txt
              WORD_COUNT=$(wc -w < tts-script.txt)
              echo "✓ Narrative generated successfully ($WORD_COUNT words)"
              SUCCESS=true
              break
            else
              echo "Failed (HTTP $HTTP_CODE). Error: ${ERROR_MSG:-Unknown / empty response}"
              echo "Raw response (truncated):"
              head -c 300 response.json
              echo ""

              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                if [ "$HTTP_CODE" = "429" ]; then
                  WAIT=$((60 * attempt))
                else
                  WAIT=$((15 * attempt))
                fi
                echo "Menunggu ${WAIT}s sebelum retry..."
                sleep "$WAIT"
              fi
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "::error::Gagal generate narasi dari OpenRouter (owl-alpha) setelah $MAX_RETRIES percobaan."
            exit 1
          fi

          echo "========================================="
          echo "GENERATED NARRATIVE SCRIPT"
          echo "========================================="
          cat tts-script.txt
          echo "========================================="
          echo "END OF SCRIPT"
          echo "========================================="

      - name: Check Script Analytics
        run: |
          echo "========================================="
          echo "Generated Characters : $(wc -m < tts-script.txt)"
          echo "Generated Words      : $(wc -w < tts-script.txt)"
          echo "========================================="


      - name: Generate TTS Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          import wave
          import struct
          import time
          import textwrap
          from google import genai
          from google.genai import types

          API_KEY = os.environ["GEMINI_API_KEY"]
          VOICE = os.environ["VOICE_NAME"]
          LANGUAGE = os.environ["LANGUAGE"]
          GAP = float(os.environ["PARA_GAP"])
          SAMPLE_RATE = 24000
          CHANNELS = 1
          SAMPLE_WIDTH = 2

          # ============================================================
          # SOLUSI 1: Chunking dinamis berbasis JUMLAH KATA, bukan jumlah
          # paragraf. Ini memastikan total request TTS selalu terkontrol
          # berapa pun banyaknya paragraf yang dihasilkan Gemini, dan tidak
          # pernah melebihi kuota harian (RPD) pada free tier.
          # ============================================================
          TARGET_WORDS_PER_CHUNK = 320   # ~2 menit audio/chunk -> aman dari truncation & drift kualitas TTS
          MAX_REQUESTS = 8               # buffer di bawah limit harian (RPD 10) untuk sisa retry
          MODEL_NAME = "gemini-3.1-flash-tts-preview"

          print("\n" + "="*70)
          print(" GEMINI TTS - SMART CHUNKING + RATE LIMIT SAFE MODE ")
          print("="*70)

          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw = f.read().strip()

          single_paragraphs = [p.strip() for p in raw.split("\n\n") if p.strip()]

          if not single_paragraphs:
              print("Error: No paragraphs found!")
              exit(1)

          paragraphs = []
          current_chunk = []
          current_words = 0

          for p in single_paragraphs:
              wc = len(p.split())
              if current_words + wc > TARGET_WORDS_PER_CHUNK and current_chunk:
                  paragraphs.append("\n\n".join(current_chunk))
                  current_chunk = []
                  current_words = 0
              current_chunk.append(p)
              current_words += wc

          if current_chunk:
              paragraphs.append("\n\n".join(current_chunk))

          # Safety net: kalau narasi sangat panjang/paragrafnya sangat pendek-pendek,
          # tetap paksa jumlah request <= MAX_REQUESTS dengan menggabungkan chunk berdekatan.
          while len(paragraphs) > MAX_REQUESTS:
              merged = []
              i = 0
              while i < len(paragraphs):
                  if i + 1 < len(paragraphs):
                      merged.append(paragraphs[i] + "\n\n" + paragraphs[i + 1])
                      i += 2
                  else:
                      merged.append(paragraphs[i])
                      i += 1
              paragraphs = merged

          print(f"Voice            : {VOICE}")
          print(f"Language         : {LANGUAGE}")
          print(f"Total Batches    : {len(paragraphs)} (limit aman: {MAX_REQUESTS})")
          print("Rate Limit Safe  : Active (Max 3 requests per minute)\n")

          client = genai.Client(api_key=API_KEY)

          def silence(sec):
              n = int(SAMPLE_RATE * sec)
              return struct.pack(f"<{n}h", *([0] * n))

          def build_prompt(text, index, total):
              if index == 0:
                  style = "Speak warmly and slowly."
              elif index == total - 1:
                  style = "Speak gently and emotionally."
              else:
                  style = "Speak naturally like a professional narrator."
              return f"Language: {LANGUAGE}\n\n{style}\n\n{textwrap.dedent(text)}"

          def call_tts(prompt_text):
              return client.models.generate_content(
                  model=MODEL_NAME,
                  contents=prompt_text,
                  config=types.GenerateContentConfig(
                      response_modalities=["AUDIO"],
                      speech_config=types.SpeechConfig(
                          voice_config=types.VoiceConfig(
                              prebuilt_voice_config=types.PrebuiltVoiceConfig(
                                  voice_name=VOICE
                              )
                          )
                      )
                  )
              )

          pcm = []

          for i, p in enumerate(paragraphs):
              print("-"*70)
              print(f"Processing Batch {i+1}/{len(paragraphs)}")
              print(textwrap.shorten(p.replace('\n', ' '), 80))

              prompt_text = build_prompt(p, i, len(paragraphs))
              success = False

              # ============================================================
              # SOLUSI 2: Retry logic TERPISAH untuk 429 (kuota habis) vs
              # 503/500 (server overload). Dua error ini punya sebab berbeda,
              # jadi strategi tunggunya juga harus berbeda:
              #  - 429/quota -> retry cepat TIDAK membantu, harus tunggu lama
              #  - 503/500/overload -> biasanya transient, backoff pendek cukup
              # ============================================================
              for retry in range(5):
                  try:
                      response = call_tts(prompt_text)

                      if response.candidates and response.candidates[0].content.parts:
                          audio = response.candidates[0].content.parts[0].inline_data.data
                          pcm.append(audio)
                          print("✓ Audio generated")
                          success = True
                          break
                      else:
                          print("No audio data received, retrying...")
                          time.sleep(15)

                  except Exception as e:
                      msg = str(e)

                      if "429" in msg or "RESOURCE_EXHAUSTED" in msg or "quota" in msg.lower():
                          wait = 90 * (retry + 1)
                          print(f"[429] Kena limit kuota RPM/RPD (attempt {retry+1}/5): {e}")
                          print(f"Menunggu {wait}s sebelum retry (kuota perlu waktu untuk reset)...")
                          time.sleep(wait)

                      elif "503" in msg or "UNAVAILABLE" in msg or "500" in msg:
                          wait = 20 * (retry + 1)
                          print(f"[503/500] Server overload / model sibuk (attempt {retry+1}/5): {e}")
                          print(f"Menunggu {wait}s sebelum retry...")
                          time.sleep(wait)

                      else:
                          wait = 20 * (retry + 1)
                          print(f"Error tak terduga (attempt {retry+1}/5): {e}")
                          time.sleep(wait)

              if not success:
                  print(f"Failed at batch {i+1} setelah semua retry gagal.")
                  exit(1)

              if i != len(paragraphs) - 1:
                  pcm.append(silence(GAP))
                  print("⏳ Cooling down 21 seconds to respect Gemini Free Tier RPM Limit...")
                  time.sleep(21)

          out = "output/audio.wav"
          with wave.open(out, "wb") as wf:
              wf.setnchannels(CHANNELS)
              wf.setsampwidth(SAMPLE_WIDTH)
              wf.setframerate(SAMPLE_RATE)
              wf.writeframes(b"".join(pcm))

          duration = sum(len(x) for x in pcm) / (SAMPLE_RATE * SAMPLE_WIDTH)

          print("\n" + "="*70)
          print("SUCCESSFULLY COMPLETED")
          print("="*70)
          print(f"Output   : {out}")
          print(f"Duration : {duration:.1f} seconds\n")
          PYEOF

      - name: Analyze Audio (Chunked Process)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import time
          import textwrap
          from google import genai
          from google.genai import types

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          # ============================================================
          # Daftar model fallback. Kalau model pertama kena 503/overload,
          # otomatis lanjut ke model berikutnya. Kalau SEMUA model di list
          # ini sudah dicoba dan tetap 503, ulangi lagi dari awal list
          # (MAX_ROUNDS putaran) dengan jeda yang makin panjang.
          # ============================================================
          MODEL_LIST = [
              "gemini-3.5-flash",
              "gemini-3.1-pro-preview",
              "gemini-3.1-flash-lite",
              "gemini-3-flash-preview",
              "gemma-4-26b-a4b-it",
              "gemma-4-31b-it",
          ]
          MAX_ROUNDS = 3

          def analyze_chunk(audio_file, prompt, sys_instruction, label):
              last_error = None
              for round_num in range(1, MAX_ROUNDS + 1):
                  for model_name in MODEL_LIST:
                      print(f"[{label}] Round {round_num}/{MAX_ROUNDS} -> mencoba model: {model_name}")
                      try:
                          response = client.models.generate_content(
                              model=model_name,
                              contents=[audio_file, prompt],
                              config=types.GenerateContentConfig(
                                  system_instruction=sys_instruction,
                                  response_mime_type="application/json"
                              )
                          )
                          data = json.loads(response.text)
                          print(f"  ✓ [{label}] Berhasil dengan model {model_name} ({len(data.get('segments', []))} segments)")
                          return data
                      except Exception as e:
                          last_error = e
                          msg = str(e)
                          if "503" in msg or "UNAVAILABLE" in msg or "500" in msg:
                              print(f"  ⚠️ {model_name} overload (503/500), lanjut ke model berikutnya...")
                          elif "429" in msg or "RESOURCE_EXHAUSTED" in msg or "quota" in msg.lower():
                              print(f"  ⚠️ {model_name} kena limit kuota (429), lanjut ke model berikutnya...")
                          else:
                              print(f"  ⚠️ {model_name} error: {str(e)[:200]}")

                  if round_num < MAX_ROUNDS:
                      wait = 30 * round_num
                      print(f"[{label}] Semua {len(MODEL_LIST)} model gagal di round {round_num}. Menunggu {wait}s lalu mengulang dari model pertama...")
                      time.sleep(wait)

              print(f"[{label}] ⚠️ GAGAL TOTAL setelah {MAX_ROUNDS} putaran x {len(MODEL_LIST)} model. Error terakhir: {last_error}")
              return {"summary": f"Analisis {label} gagal total setelah semua model & retry dicoba.", "segments": []}

          print("\n" + "="*70)
          print(" AUDIO ANALYSIS (CHUNKED OMIT LIMIT MODE) ")
          print("="*70 + "\n")

          print("Uploading full audio...")
          audio = client.files.upload(file="output/audio.wav")
          print("✓ Upload completed")
          print(f"{audio.uri}\n")

          system_instruction = """
          You are an Elite Avant-Garde Creative Director and Master Cyber-Surrealist Artist specializing in world-class 2D modern flat vector illustration for deep psychological, philosophical, and high-intellect cinematic narratives. 
          
          Your job is to translate complex emotional audio into breathtaking, deeply atmospheric, and highly sophisticated visual prompt scripts AND precise video transition directives for FFmpeg.

          CRITICAL QUALITY MANDATE FOR IMAGE_PROMPT:
          - Every single 'image_prompt' MUST be an incredibly dense, ultra-detailed masterpiece, strictly between 1,500 and 2,000 characters long. Avoid generic phrasing.
          - STYLE: Masterpiece 2D Modern Flat Vector Illustration, highly sophisticated editorial design style, clean geometric shapes, complex vector layering. NEVER use 'photorealistic', '3D render', 'hyperrealistic', 'skeuomorphic', or 'octane render'.
          - VISUAL DEPTH: The flat vector style must look premium, complex, and cinematic. Achieve this through multi-layered backgrounds, isometric perspectives, intricate geometric patterns, and rich textures created purely from flat vector shading.
          - CHARACTER DESIGN: The subject must be an expressive character with elegant, avant-garde cartoonish proportions (slightly enlarged head to amplify deep internal emotion, expressive eyes, stylized anatomy). Clothing must feature solid, rich, deeply saturated colors with crisp minimalist creases.
          - BACKGROUND & ENVIRONMENT: A striking, minimalist but highly detailed environment drawn with ultra-thin, precise light-gray and muted-ink lines. The setting must feel vast, atmospheric, and architectural, incorporating clean lines, perfect symmetry, or unsettling distorted perspectives on a pure clinical white canvas.
          - LIGHTING & COLOR PALETTE: Establish high-contrast, moody, and dramatic atmospheric lighting using flat color gradients and sharp vector shadows (chiaroscuro vector technique). Use an elite, highly curated color palette: deep midnight blues, rich terracottas, muted sages, or royal gold accents clashing against the clean white environment.
          - SURREAL PSYCHOLOGICAL METAPHOR: This is the core focus. You must avoid literal interpretations. Incorporate profound, mind-bending, and highly unexpected surreal psychological metaphors to depict the subconscious mind. (Examples: a character's head shattering into a perfectly organized constellation of geometric glass shards, shadows stretching into infinite labyrinthine corridors, or thoughts manifesting as neon threads weaving through an architectural void).
          
          FFmpeg VIDEO EDITING MANDATE:
          Determine the best movement and transition for each segment based on emotional intensity:
          - camera_movement options: 'zoom_in_slow', 'zoom_out_slow', 'pan_left', 'pan_right', 'pan_up', 'pan_down', 'static'.
          - transition_effect options: 'fade', 'crossfade', 'wipe_left', 'wipe_right', 'slide_up', 'zoom_blur', 'none'.
          
          Strictly output ONLY valid JSON matching the exact schema provided. No markdown wrappers.
          """

          base_prompt_template = """
          Analyze the specified part of this narration audio. Break down the timeline into high-impact sequential segments (every 3 to 8 seconds) with precise timestamps.

          CRITICAL FOCUS: You must ONLY analyze the part of the audio that matches this text section:
          \"\"\"{text_chunk}\"\"\"

          Your output must strictly follow this JSON structure:
          {{
            "summary": "Deep overarching theme analysis for this section.",
            "segments": [
              {{
                "start": "MM:SS",
                "end": "MM:SS",
                "duration": 5,
                "text": "Spoken text matching the audio timestamp.",
                "subtitle": "Clean subtitle.",
                "image_prompt": "A masterwork of 2D modern flat vector illustration, premium editorial graphic design style. Top text header dynamically reads: '[DYNAMIC HEADERTEXT]'. [Write an extremely exhaustive, detailed description of the subject, their profound psychological expression, avant-garde cartoonish proportions, specific rich clothing colors, and precise body language]. [Describe an incredibly vivid, complex, and mind-blowing surreal psychological metaphor action occurring in the scene that represents the subconscious mind in depth]. Background: a vast, meticulous, and stunning minimalist environment composed of ultra-thin light-gray architectural line art outlines, intricate geometric patterns, and layered isometric structures on a pure crisp white background. Aesthetic: high-contrast dramatic vector shadows, crisp geometric execution, highly curated color palette featuring deep muted tones, professional corporate-surrealist editorial art style. Overwhelmingly detailed, rich in visual information, cinematic composition, elite flat design.",
                "camera_movement": "Choose one: zoom_in_slow / zoom_out_slow / pan_left / pan_right / pan_up / pan_down / static",
                "transition_effect": "Choose one: fade / crossfade / wipe_left / wipe_right / slide_up / zoom_blur / none",
                "transition_duration": 0.5,
                "emotion": "Subconscious emotion."
              }}
            ]
          }}
          Note: Ensure the image_prompt is densely packed, complex, and meticulously detailed, staying strictly within the 1,500 to 2,000 character limit to maximize freegen.app generation quality.
          """

          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw_script = f.read().strip()
          
          single_paragraphs = [p.strip() for p in raw_script.split("\n\n") if p.strip()]
          half = len(single_paragraphs) // 2
          
          chunk1_text = "\n\n".join(single_paragraphs[:half])
          chunk2_text = "\n\n".join(single_paragraphs[half:])

          combined_segments = []
          summary_parts = []

          print("Analyzing Audio Part 1/2...")
          prompt1 = base_prompt_template.format(text_chunk=chunk1_text)
          data1 = analyze_chunk(audio, prompt1, system_instruction, "Part 1/2")
          combined_segments.extend(data1.get("segments", []))
          summary_parts.append(data1.get("summary", ""))

          print("\nAnalyzing Audio Part 2/2...")
          prompt2 = base_prompt_template.format(text_chunk=chunk2_text)
          data2 = analyze_chunk(audio, prompt2, system_instruction, "Part 2/2")
          combined_segments.extend(data2.get("segments", []))
          summary_parts.append(data2.get("summary", ""))


          final_analysis = {
              "summary": " | ".join(summary_parts),
              "segments": combined_segments
          }

          os.makedirs("release", exist_ok=True)
          with open("release/analysis.json", "w", encoding="utf8") as f:
              json.dump(final_analysis, f, indent=2, ensure_ascii=False)

          print("\n" + "="*70)
          print(f"SUCCESS: Combined analysis.json saved with {len(combined_segments)} total segments!")
          print("="*70)
          PYEOF

      - name: Generate Images (Parallel)
        run: |
          cat > generate-images.js <<'EOF'
          const { chromium } = require("playwright");
          const fs = require("fs");

          const analysis = JSON.parse(
              fs.readFileSync("release/analysis.json", "utf8")
          );
          const segments = analysis.segments;
          const MAX_WORKERS = 5;

          fs.mkdirSync("release/images", { recursive: true });

          async function generate(page, segment, index) {
              console.log(`\nGenerating ${index+1}/${segments.length}`);
              console.log(`${segment.start} -> ${segment.end}`);
              
              for (let retry = 1; retry <= 3; retry++) {
                  try {
                      await page.goto("https://freegen.app/", {
                          waitUntil: "domcontentloaded"
                      });
                      
                      await page.selectOption("#aspectRatioSelect", "16:9");
                      await page.fill("#prompt", segment.image_prompt);
                      await page.keyboard.press("Enter");
                      
                      const imageContainer = page.locator("#imageContainer");
                      await imageContainer.waitFor({ timeout: 90000 });
                      
                      const img = imageContainer.locator("img");
                      const src = await img.getAttribute("src");
                      const base64 = src.replace(/^data:image\/[a-z]+;base64,/, "");
                      
                      const out = `release/images/${String(index+1).padStart(3, "0")}.jpg`;
                      fs.writeFileSync(out, base64, "base64");
                      
                      console.log("✓", out);
                      return;
                  } catch (err) {
                      console.log(`Retry ${retry}: ${err.message}`);
                      if (retry === 3) {
                          fs.writeFileSync(
                              `release/images/${String(index+1).padStart(3, "0")}.error.txt`,
                              err.stack
                          );
                      }
                  }
              }
          }

          async function worker(id, browser, queue) {
              const page = await browser.newPage();
              while (true) {
                  const index = queue.shift();
                  if (index === undefined) break;
                  console.log(`Worker ${id} -> ${index+1}`);
                  await generate(page, segments[index], index);
              }
              await page.close();
          }

          (async () => {
              const queue = Array.from({ length: segments.length }, (_, i) => i);
              
              console.log("\n==============================");
              console.log("IMAGE GENERATOR");
              console.log("==============================");
              console.log(`Workers  : ${MAX_WORKERS}`);
              console.log(`Segments : ${segments.length}`);
              
              const browser = await chromium.launch({ headless: true });
              await Promise.all(
                  Array.from({ length: Math.min(MAX_WORKERS, segments.length) }, (_, i) =>
                      worker(i + 1, browser, queue)
                  )
              );
              await browser.close();
              console.log("\nDONE");
          })();
          EOF
          
          node generate-images.js

      - name: Compile Final Video (FFmpeg 16:9 Widescreen Automation)
        continue-on-error: true
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys, shutil

          print("\n" + "="*70)
          print(" CONVERTING IMAGES & AUDIO TO 16:9 WIDESCREEN VIDEO ")
          print("="*70 + "\n")

          # ============================================================
          # Seluruh proses ffmpeg dibungkus try/except. Kalau ada yang
          # gagal di tengah jalan (ffmpeg tidak ada, segmen rusak, dll),
          # script TIDAK exit(1) -- supaya step berikutnya (zip images &
          # publish release) tetap jalan dengan asset yang sudah ada
          # (output/audio.wav, release/analysis.json, release/images.zip).
          # ============================================================
          try:
              if shutil.which("ffmpeg") is None:
                  raise RuntimeError("ffmpeg tidak ditemukan di PATH. Cek step 'Install FFmpeg'.")

              with open("release/analysis.json", "r", encoding="utf8") as f:
                  analysis = json.load(f)

              segments = analysis["segments"]
              failed_segments = 0

              with open("release/inputs.txt", "w", encoding="utf8") as f:
                  for i, seg in enumerate(segments):
                      # PERBAIKAN: Menggunakan .zfill(3) khas Python, bukan .padStart()
                      idx_str = str(i+1).zfill(3)
                      img_path = f"release/images/{idx_str}.jpg"
                      duration = float(seg.get("duration", 5.0))

                      if not os.path.exists(img_path):
                          print(f"File gambar {img_path} tidak ditemukan, melewati segmen.")
                          failed_segments += 1
                          continue

                      segment_video = f"release/seg_{idx_str}.mp4"
                      movement = seg.get("camera_movement", "static")

                      # SETTING RESOLUSI LANSKAP (1920x1080) & SKALA INPUT ZOOMPAN
                      if "zoom_in" in movement:
                          vf_effects = "scale=2560:1440,zoompan=z='min(zoom+0.0015,1.3)':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                      elif "zoom_out" in movement:
                          vf_effects = "scale=2560:1440,zoompan=z='max(1.3-0.0015*in,1.0)':d=1:x='iw/2-(iw/zoom/2)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                      elif "pan_right" in movement:
                          vf_effects = "scale=2560:1080,zoompan=z=1.2:x='0.002*in*(iw-iw/zoom)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                      elif "pan_left" in movement:
                          vf_effects = "scale=2560:1080,zoompan=z=1.2:x='(1-0.002*in)*(iw-iw/zoom)':y='ih/2-(ih/zoom/2)':s=1920x1080"
                      else:
                          vf_effects = "scale=1920:1080"

                      print(f"Memproses segmen 16:9 {idx_str} -> Durasi: {duration} s, Efek Kamera: {movement}")

                      cmd = [
                          "ffmpeg", "-y", "-loop", "1", "-i", img_path,
                          "-vf", vf_effects, "-c:v", "libx264", "-t", str(duration),
                          "-pix_fmt", "yuv420p", "-r", "25", segment_video
                      ]
                      result = subprocess.run(cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
                      if result.returncode != 0:
                          print(f"⚠️ ffmpeg gagal di segmen {idx_str}: {result.stderr.decode(errors='ignore')[:300]}")
                          failed_segments += 1
                          continue
                      f.write(f"file 'seg_{idx_str}.mp4'\n")

              if failed_segments == len(segments):
                  raise RuntimeError("Semua segmen gagal diproses, tidak ada video yang bisa disambung.")

              print("\nMenyambungkan seluruh klip video 16:9...")
              concat_cmd = [
                  "ffmpeg", "-y", "-f", "concat", "-safe", "0", "-i", "release/inputs.txt",
                  "-c", "copy", "release/visual_only.mp4"
              ]
              result = subprocess.run(concat_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
              if result.returncode != 0 or not os.path.exists("release/visual_only.mp4"):
                  raise RuntimeError(f"Gagal menyambung klip video: {result.stderr.decode(errors='ignore')[:300]}")

              print("Menggabungkan visual dengan audio narasi asli...")
              final_cmd = [
                  "ffmpeg", "-y", "-i", "release/visual_only.mp4", "-i", "output/audio.wav",
                  "-c:v", "copy", "-c:a", "aac", "-shortest", "output/final_project_video.mp4"
              ]
              result = subprocess.run(final_cmd, stdout=subprocess.DEVNULL, stderr=subprocess.PIPE)
              if result.returncode != 0 or not os.path.exists("output/final_project_video.mp4"):
                  raise RuntimeError(f"Gagal menggabungkan video & audio: {result.stderr.decode(errors='ignore')[:300]}")

              print("\n" + "="*70)
              print("✓ BERHASIL: Video final panjang 16:9 disimpan di 'output/final_project_video.mp4'")
              print("="*70)

          except Exception as e:
              print("\n" + "="*70)
              print(f"⚠️ GAGAL membuat video final: {e}")
              print("Pipeline TETAP dilanjutkan tanpa final_project_video.mp4.")
              print("Asset yang tetap akan dipublish ke release: output/audio.wav, release/analysis.json, release/images.zip")
              print("="*70)

          # Sengaja TIDAK exit(1) di sini -- supaya step zip images & publish release tetap berjalan
          # walau pembuatan video gagal total.
          sys.exit(0)
          PYEOF

          
      - name: Create Artifacts Images
        if: always()
        run: |
          mkdir -p release/images
          cd release
          zip -r images.zip images/ || echo "Tidak ada gambar untuk di-zip, lanjut tanpa images.zip"
          cd ..

      - name: Publish Release Assets
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_number }}
          name: Storyboard & Video Widescreen Project ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          preserve_order: true
          files: |
            output/audio.wav
            output/final_project_video.mp4
            release/analysis.json
            release/images.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
