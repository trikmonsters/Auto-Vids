name: Text → TTS → Audio Analysis

on:
  workflow_dispatch:
    inputs:
      text:
        description: "Text yang akan dijadikan narasi"
        required: true
        type: string
      voice:
        description: "Gemini Voice"
        required: false
        default: "Sulafat"
      language:
        description: "Language"
        required: false
        default: "id-ID"
      paragraph_gap:
        description: "Gap antar paragraf (detik)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      TEXT: ${{ github.event.inputs.text }}
      VOICE_NAME: ${{ github.event.inputs.voice }}
      LANGUAGE: ${{ github.event.inputs.language }}
      PARA_GAP: ${{ github.event.inputs.paragraph_gap }}

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai
          npm install
          npm install playwright
          npx playwright install chromium

      - name: Prepare Workspace
        run: |
          mkdir -p output release
          printf "%s" "$TEXT" > tts-script.txt
          
          echo "========================================="
          echo "Input Characters : $(wc -m < tts-script.txt)"
          echo "Input Words      : $(wc -w < tts-script.txt)"
          echo "========================================="

      - name: Generate TTS Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os
          import wave
          import struct
          import time
          import textwrap
          from google import genai
          from google.genai import types

          # Configuration
          API_KEY = os.environ["GEMINI_API_KEY"]
          VOICE = os.environ["VOICE_NAME"]
          LANGUAGE = os.environ["LANGUAGE"]
          GAP = float(os.environ["PARA_GAP"])
          SAMPLE_RATE = 24000
          CHANNELS = 1
          SAMPLE_WIDTH = 2

          print("\n" + "="*70)
          print(" GEMINI TEXT TO SPEECH ")
          print("="*70)

          # Read text
          with open("tts-script.txt", "r", encoding="utf8") as f:
              raw = f.read().strip()
          
          paragraphs = [p.strip() for p in raw.split("\n\n") if p.strip()]
          
          print(f"Voice      : {VOICE}")
          print(f"Language   : {LANGUAGE}")
          print(f"Paragraphs : {len(paragraphs)}\n")

          client = genai.Client(api_key=API_KEY)

          def silence(sec):
              n = int(SAMPLE_RATE * sec)
              return struct.pack(f"<{n}h", *([0] * n))

          def build_prompt(text, index, total):
              if index == 0:
                  style = "Speak warmly and slowly."
              elif index == total - 1:
                  style = "Speak gently and emotionally."
              else:
                  style = "Speak naturally like a professional narrator."
              
              return f"Language: {LANGUAGE}\n\n{style}\n\n{textwrap.dedent(text)}"

          pcm = []

          for i, p in enumerate(paragraphs):
              print("-"*70)
              print(f"Paragraph {i+1}/{len(paragraphs)}")
              print(textwrap.shorten(p, 80))
              
              for retry in range(4):
                  try:
                      response = client.models.generate_content(
                          model="gemini-3.1-flash-tts-preview",
                          contents=build_prompt(p, i, len(paragraphs)),
                          config=types.GenerateContentConfig(
                              response_modalities=["AUDIO"],
                              speech_config=types.SpeechConfig(
                                  voice_config=types.VoiceConfig(
                                      prebuilt_voice_config=types.PrebuiltVoiceConfig(
                                          voice_name=VOICE
                                      )
                                  )
                              )
                          )
                      )
                      
                      audio = response.candidates[0].content.parts[0].inline_data.data
                      pcm.append(audio)
                      print("✓ generated")
                      break
                  except Exception as e:
                      print(f"Error: {e}")
                      time.sleep(2 ** retry)
              
              if i != len(paragraphs) - 1:
                  pcm.append(silence(GAP))
                  print(f"Gap {GAP}s")

          # Save audio
          out = "output/audio.wav"
          with wave.open(out, "wb") as wf:
              wf.setnchannels(CHANNELS)
              wf.setsampwidth(SAMPLE_WIDTH)
              wf.setframerate(SAMPLE_RATE)
              wf.writeframes(b"".join(pcm))

          duration = sum(len(x) for x in pcm) / (SAMPLE_RATE * SAMPLE_WIDTH)
          
          print("\n" + "="*70)
          print("DONE")
          print("="*70)
          print(f"Output   : {out}")
          print(f"Duration : {duration:.1f} seconds\n")
          PYEOF

      - name: Analyze Audio
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import textwrap
          from google import genai
          from google.genai import types

          client = genai.Client(api_key=os.environ["GEMINI_API_KEY"])

          print("\n" + "="*70)
          print(" AUDIO ANALYSIS ")
          print("="*70 + "\n")

          print("Uploading audio...")
          audio = client.files.upload(file="output/audio.wav")
          print("✓ Upload completed")
          print(f"{audio.uri}\n")

          prompt = """
          You are an expert movie storyboard creator.
          Analyze this narration audio.
          Return ONLY valid JSON.
          
          Schema:
          {
            "summary": "",
            "segments": [
              {
                "start": "00:00",
                "end": "00:05",
                "duration": 5,
                "text": "",
                "subtitle": "",
                "image_prompt": "",
                "camera": "",
                "lighting": "",
                "emotion": "",
                "keywords": []
              }
            ]
          }
          
          Rules:
          - Split naturally every 3-8 seconds
          - Timestamp MUST follow narration
          - text = spoken narration
          - subtitle = clean subtitle
          - image_prompt = highly detailed cinematic AI image prompt
          - camera = camera angle
          - lighting = movie lighting
          - emotion = dominant emotion
          - keywords = array
          - Output JSON only
          """

          response = client.models.generate_content(
              model="gemini-2.5-flash",
              contents=[audio, prompt],
              config=types.GenerateContentConfig(
                  response_mime_type="application/json"
              )
          )

          data = json.loads(response.text)
          
          os.makedirs("release", exist_ok=True)
          with open("release/analysis.json", "w", encoding="utf8") as f:
              json.dump(data, f, indent=2, ensure_ascii=False)

          print("="*70)
          print("SUMMARY")
          print("="*70)
          print(data["summary"] + "\n")

          print("="*70)
          print("SEGMENTS")
          print("="*70)
          
          for i, seg in enumerate(data["segments"], 1):
              print(f"\nSegment {i}")
              print(f"{seg['start']} → {seg['end']}\n")
              print("Narration:")
              print(textwrap.fill(seg["text"], width=80) + "\n")
              print("Image Prompt:")
              print(textwrap.fill(seg["image_prompt"], width=80))
              print("-"*70)
          
          print("\nanalysis.json saved")
          PYEOF

      - name: Generate Images (Parallel)
        run: |
          cat > generate-images.js <<'EOF'
          const { chromium } = require("playwright");
          const fs = require("fs");

          const analysis = JSON.parse(
              fs.readFileSync("release/analysis.json", "utf8")
          );
          const segments = analysis.segments;
          const MAX_WORKERS = 4;

          fs.mkdirSync("release/images", { recursive: true });

          async function generate(page, segment, index) {
              console.log(`\nGenerating ${index+1}/${segments.length}`);
              console.log(`${segment.start} -> ${segment.end}`);
              
              for (let retry = 1; retry <= 3; retry++) {
                  try {
                      await page.goto("https://freegen.app/", {
                          waitUntil: "domcontentloaded"
                      });
                      
                      await page.selectOption("#aspectRatioSelect", "9:16");
                      await page.fill("#prompt", segment.image_prompt);
                      await page.keyboard.press("Enter");
                      
                      const imageContainer = page.locator("#imageContainer");
                      await imageContainer.waitFor({ timeout: 90000 });
                      
                      const img = imageContainer.locator("img");
                      const src = await img.getAttribute("src");
                      const base64 = src.replace(/^data:image\/[a-z]+;base64,/, "");
                      
                      const out = `release/images/${String(index+1).padStart(3, "0")}.jpg`;
                      fs.writeFileSync(out, base64, "base64");
                      
                      console.log("✓", out);
                      return;
                  } catch (err) {
                      console.log(`Retry ${retry}: ${err.message}`);
                      if (retry === 3) {
                          fs.writeFileSync(
                              `release/images/${String(index+1).padStart(3, "0")}.error.txt`,
                              err.stack
                          );
                      }
                  }
              }
          }

          async function worker(id, browser) {
              const page = await browser.newPage();
              while (true) {
                  const index = queue.shift();
                  if (index === undefined) break;
                  console.log(`Worker ${id} -> ${index+1}`);
                  await generate(page, segments[index], index);
              }
              await page.close();
          }

          const queue = Array.from({ length: segments.length }, (_, i) => i);

          (async () => {
              console.log("\n==============================");
              console.log("IMAGE GENERATOR");
              console.log("==============================");
              console.log(`Workers  : ${MAX_WORKERS}`);
              console.log(`Segments : ${segments.length}`);
              
              const browser = await chromium.launch({ headless: true });
              await Promise.all(
                  Array.from({ length: MAX_WORKERS }, (_, i) =>
                      worker(i + 1, browser)
                  )
              );
              await browser.close();
              console.log("\nDONE");
          })();
          EOF
          
          node generate-images.js

      - name: Create Images Archive
        run: |
          cd release
          zip -r images.zip images/
          cd ..

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_number }}
          name: Storyboard ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          preserve_order: true
          files: |
            output/audio.wav
            release/analysis.json
            release/images.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
