name: Text → TTS → Audio Analysis

on:
  workflow_dispatch:
    inputs:

      text:
        description: "Text yang akan dijadikan narasi"
        required: true
        type: string

      voice:
        description: "Gemini Voice"
        required: false
        default: "Sulafat"

      language:
        description: "Language"
        required: false
        default: "id-ID"

      paragraph_gap:
        description: "Gap antar paragraf (detik)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:

  pipeline:

    runs-on: ubuntu-latest

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      TEXT: ${{ github.event.inputs.text }}

      VOICE_NAME: ${{ github.event.inputs.voice }}

      LANGUAGE: ${{ github.event.inputs.language }}

      PARA_GAP: ${{ github.event.inputs.paragraph_gap }}

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Packages

        run: |

          python -m pip install --upgrade pip

          pip install google-genai

      - name: Prepare Workspace

        run: |

          mkdir -p output
          mkdir -p release

          printf "%s" "$TEXT" > tts-script.txt

          echo "========================================="
          echo "Input Characters : $(wc -m < tts-script.txt)"
          echo "Input Words      : $(wc -w < tts-script.txt)"
          echo "========================================="

      - name: Generate TTS Audio

        env:

          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |

          python3 << 'PYEOF'

          import os
          import wave
          import struct
          import time
          import textwrap

          from google import genai
          from google.genai import types

          API_KEY=os.environ["GEMINI_API_KEY"]

          VOICE=os.environ["VOICE_NAME"]

          LANGUAGE=os.environ["LANGUAGE"]

          GAP=float(os.environ["PARA_GAP"])

          SAMPLE_RATE=24000

          CHANNELS=1

          SAMPLE_WIDTH=2

          print()

          print("="*70)
          print(" GEMINI TEXT TO SPEECH ")
          print("="*70)

          with open("tts-script.txt","r",encoding="utf8") as f:

              raw=f.read().strip()

          paragraphs=[p.strip() for p in raw.split("\n\n") if p.strip()]

          print(f"Voice      : {VOICE}")
          print(f"Language   : {LANGUAGE}")
          print(f"Paragraphs : {len(paragraphs)}")
          print()

          client=genai.Client(api_key=API_KEY)

          def silence(sec):

              n=int(SAMPLE_RATE*sec)

              return struct.pack(f"<{n}h",*([0]*n))

          pcm=[]

          def prompt(txt,index,total):

              if index==0:

                  style="Speak warmly and slowly."

              elif index==total-1:

                  style="Speak gently and emotionally."

              else:

                  style="Speak naturally like a professional narrator."

              return f"""
          Language : {LANGUAGE}
          
          {style}
          
          {textwrap.dedent(txt)}
          """

          for i,p in enumerate(paragraphs):
          
              print("-"*70)
              print(f"Paragraph {i+1}/{len(paragraphs)}")
              print(textwrap.shorten(p,80))
              for retry in range(4):

                  try:
                      r=client.models.generate_content(
                          model="gemini-3.1-flash-tts-preview",
                          contents=prompt(p,i,len(paragraphs)),
                          config=types.GenerateContentConfig(
                              response_modalities=["AUDIO"],
                              speech_config=types.SpeechConfig(
                                  voice_config=types.VoiceConfig(
                                      prebuilt_voice_config=types.PrebuiltVoiceConfig(
                                          voice_name=VOICE
                                      )
                                  )
                              )
                          )
                      )

                      audio=r.candidates[0].content.parts[0].inline_data.data

                      pcm.append(audio)

                      print("✓ generated")

                      break

                  except Exception as e:

                      print(e)

                      time.sleep(2**retry)

              if i!=len(paragraphs)-1:

                  pcm.append(silence(GAP))

                  print(f"Gap {GAP}s")

          out="output/audio.wav"

          with wave.open(out,"wb") as wf:

              wf.setnchannels(CHANNELS)

              wf.setsampwidth(SAMPLE_WIDTH)

              wf.setframerate(SAMPLE_RATE)

              wf.writeframes(b"".join(pcm))

          duration=sum(len(x) for x in pcm)/(SAMPLE_RATE*SAMPLE_WIDTH)

          print()
          print("="*70)
          print("DONE")
          print("="*70)
          print(f"Output   : {out}")
          print(f"Duration : {duration:.1f} seconds")
          print()

          PYEOF

    
      - name: Analyze Audio

        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |

          python3 << 'PYEOF'

          import json
          import os
          import textwrap

          from google import genai
          from google.genai import types

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          print()
          print("="*70)
          print(" AUDIO ANALYSIS ")
          print("="*70)
          print()

          print("Uploading audio...")

          audio = client.files.upload(
              file="output/audio.wav"
          )

          print("✓ Upload selesai")
          print(audio.uri)
          print()

          prompt = """
          You are an expert movie storyboard creator.
          
          Analyze this narration audio.
          
          Return ONLY valid JSON.
          
          Schema:
          
          {
            "summary":"",
            "segments":[
              {
                "start":"00:00",
                "end":"00:05",
                "duration":5,
                "text":"",
                "subtitle":"",
                "image_prompt":"",
                "camera":"",
                "lighting":"",
                "emotion":"",
                "keywords":[]
              }
            ]
          }
          
          Rules:
          
          - Split naturally every 3–8 seconds.
          - Timestamp MUST follow narration.
          - text = spoken narration.
          - subtitle = clean subtitle.
          - image_prompt = highly detailed cinematic AI image prompt.
          - camera = camera angle.
          - lighting = movie lighting.
          - emotion = dominant emotion.
          - keywords = array.
          - Output JSON only.
          """

          response = client.models.generate_content(

              model="gemini-2.5-flash",

              contents=[
                  audio,
                  prompt
              ],

              config=types.GenerateContentConfig(
                  response_mime_type="application/json"
              )

          )

          data = json.loads(response.text)

          os.makedirs("release", exist_ok=True)

          with open(
              "release/analysis.json",
              "w",
              encoding="utf8"
          ) as f:

              json.dump(
                  data,
                  f,
                  indent=2,
                  ensure_ascii=False
              )

          print()
          print("="*70)
          print("SUMMARY")
          print("="*70)
          print(data["summary"])
          print()

          print("="*70)
          print("SEGMENTS")
          print("="*70)

          for i, seg in enumerate(data["segments"],1):

              print()

              print(f"Segment {i}")

              print(f"{seg['start']} → {seg['end']}")

              print()

              print("Narration")

              print(
                  textwrap.fill(
                      seg["text"],
                      width=80
                  )
              )

              print()

              print("Image Prompt")

              print(
                  textwrap.fill(
                      seg["image_prompt"],
                      width=80
                  )
              )

              print("-"*70)

          print()

          print("analysis.json saved")

          PYEOF


      - name: Generate Storyboard Images
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

        run: |
          python3 << 'PYEOF'

          import json
          import os
          import time
          import textwrap

          from google import genai
          from google.genai import types

          client = genai.Client(
              api_key=os.environ["GEMINI_API_KEY"]
          )

          with open(
              "release/analysis.json",
              encoding="utf8"
          ) as f:

              analysis = json.load(f)

          segments = analysis["segments"]

          os.makedirs("release/images", exist_ok=True)

          SYSTEM_PROMPT = """
          You are the Lead Visual Development Artist of an award-winning animated feature film.
          
          MISSION
          
          Create ONE storyboard illustration from the given narration.
          
          GLOBAL STYLE
          
          Premium 2D Animation
          
          Hand-painted digital illustration
          
          Modern animated movie
          
          Beautiful cinematic composition
          
          Painterly rendering
          
          Soft brush texture
          
          Anime inspired color harmony
          
          Disney emotional storytelling
          
          Pixar quality composition
          
          DreamWorks staging
          
          Highly expressive characters
          
          Beautiful facial expression
          
          Dynamic camera
          
          Strong storytelling
          
          Detailed environment
          
          Rich atmosphere
          
          Volumetric lighting
          
          Global illumination
          
          Soft rim light
          
          Depth of field
          
          Beautiful perspective
          
          Consistent character design
          
          Consistent costume
          
          Consistent color palette
          
          Consistent background style
          
          Consistent world building
          
          Vertical 9:16
          
          No watermark
          
          No logo
          
          No caption
          
          No subtitle
          
          No text
          
          No speech bubble
          
          Only ONE illustration
          
          The illustration must faithfully depict the narration.
          
          Always prioritize storytelling over decoration.
          """

          print()
          print("="*70)
          print("IMAGE GENERATION")
          print("="*70)

          for idx, seg in enumerate(segments, start=1):

              print()
              print("-"*70)
              print(
                  f"Segment {idx}/{len(segments)}"
              )

              print(
                  f"{seg['start']} -> {seg['end']}"
              )

              prompt = f"""
              SCENE DESCRIPTION
              
              {seg.get('scene_description','')}
              
              CHARACTER
              
              {seg.get('character_description','')}
              
              NARRATION
              
              {seg['text']}
              
              EMOTION
              
              {seg.get('emotion','')}
              
              CAMERA
              
              {seg.get('camera','')}
              
              LIGHTING
              
              {seg.get('lighting','')}
              
              COLOR PALETTE
              
              {seg.get('color_palette','')}
              
              VISUAL PROMPT
              
              {seg['image_prompt']}
              
              CONTINUITY NOTES
              
              {seg.get('continuity_notes','')}
              
              Generate ONE premium storyboard frame.
              
              Keep continuity with previous scenes.
            
              Maintain identical character appearance.
              
              High quality 2D animated movie.
              
              """

              print()
              print("Prompt Preview")
              print()

              print(
                  textwrap.shorten(
                      seg["image_prompt"],
                      width=120
                  )
              )

              success=False

              for retry in range(4):
                  try:

                      response = client.models.generate_content(
                          model="gemini-2.5-flash-image",
                          contents=prompt,
                          config=types.GenerateContentConfig(
                              system_instruction=SYSTEM_PROMPT,
                              response_modalities=[
                                  "TEXT",
                                  "IMAGE"
                              ],
                              image_config=types.ImageConfig(
                                  aspect_ratio="9:16",
                                  image_size="1K"
                              )
                          )
                      )

                      saved=False

                      for part in response.candidates[0].content.parts:

                          if getattr(part, "inline_data", None):

                              out=f"release/images/{idx:03d}.png"

                              with open(out,"wb") as img:

                                  img.write(
                                      part.inline_data.data
                                  )

                              print()
                              print(f"✓ Saved {out}")

                              saved=True

                              success=True

                              break

                      if saved:
                          break

                      raise RuntimeError(
                          "No image returned."
                      )

                  except Exception as e:

                      wait=2**retry

                      print(
                          f"Retry {retry+1}: {e}"
                      )

                      time.sleep(wait)

              if not success:

                  raise RuntimeError(
                      f"Failed segment {idx}"
                  )

          print()
          print("="*70)
          print("ALL IMAGES GENERATED")
          print("="*70)

          PYEOF

      - name: Compress Images
        run: |
          cd release
          zip -r images.zip images

          ls -lh

          echo
          echo "Release files"
          echo "-------------"

          ls -lh .


      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: run-${{ github.run_number }}
          name: Storyboard ${{ github.run_number }}
          draft: false
          prerelease: false
          generate_release_notes: true
          preserve_order: true
          files: |
            output/audio.wav
            release/analysis.json
            release/images.zip

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
